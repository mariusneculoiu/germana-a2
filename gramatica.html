:"gehen -> ging","explanation":"gehen e neregulat -> ging. wir gingen."},{"type":"fill","prompt":"Als Kind ___ ich oft Fussball. (spielen, ich)","answer":"spielte","hint":"regulat: -te","explanation":"spielen e regulat. ich spielte = jucam."},{"type":"fill","prompt":"Er ___ gestern krank. (sein, er)","answer":"war","hint":"sein -> ?","explanation":"sein e neregulat. ich/er war."},{"type":"choice","prompt":"Ich ___ nicht kommen. (nu puteam)","options":["kann","konnte","kannte","können"],"answer":"konnte","explanation":"können la Präteritum -> konnte (pierde umlaut, adauga -te)."},{"type":"transform","prompt":"Präteritum: Sie hat ein Auto.","answer":"Sie hatte ein Auto.","hint":"haben -> hatte","explanation":"haben -> hatte (avea)."}]}];

const STORAGE = {
  progress: "gramatica_progress_v1",
  stats: "gramatica_stats_v1"
};
function loadJSON(k, fb) { try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch(e) { return fb; } }
function saveJSON(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

let progress = loadJSON(STORAGE.progress, {}); // { topicId: { exIdx: "correct"|"incorrect"|"skipped" } }
let stats = loadJSON(STORAGE.stats, {}); // { topicId: { correct, total } }

// Filter state
let activeLevel = "all";
let activeCategory = "all";
let currentTopic = null;
let currentExIdx = 0;

// === TOPIC LIST ===
function getCategories() {
  const cats = new Set();
  TOPICS.forEach(t => { if (matchesLevel(t)) cats.add(t.category); });
  return Array.from(cats).sort();
}

function matchesLevel(t) {
  return activeLevel === "all" || t.level === activeLevel;
}
function matchesCategory(t) {
  return activeCategory === "all" || t.category === activeCategory;
}

function populateCategorySelect() {
  const sel = document.getElementById("cat-select");
  const cats = getCategories();
  const cur = sel.value;
  sel.innerHTML = '<option value="all">Toate categoriile</option>';
  cats.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });
  sel.value = cats.includes(cur) ? cur : "all";
  activeCategory = sel.value;
}

document.querySelectorAll("[data-level]").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll("[data-level]").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  activeLevel = b.dataset.level;
  activeCategory = "all";
  populateCategorySelect();
  renderTopicList();
}));

function renderTopicList() {
  activeCategory = document.getElementById("cat-select").value;
  const filtered = TOPICS.filter(t => matchesLevel(t) && matchesCategory(t));
  document.getElementById("topic-count").textContent = filtered.length + " topicuri";
  const grid = document.getElementById("topic-grid");
  grid.innerHTML = "";
  if (!filtered.length) {
    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#6b7280;">Niciun topic in acest filtru.</div>';
    return;
  }
  filtered.forEach(t => {
    const s = stats[t.id] || { correct: 0, total: 0 };
    const exDone = (progress[t.id] && Object.keys(progress[t.id]).length) || 0;
    const pct = t.exercises.length ? Math.round(100 * exDone / t.exercises.length) : 0;
    const card = document.createElement("div");
    card.className = "topic-card";
    card.innerHTML = `
      <span class="level-badge level-${t.level}">${t.level}</span>
      <div class="category">${escapeHtml(t.category)}</div>
      <h3>${escapeHtml(t.title_de)}</h3>
      <div class="subtitle">${escapeHtml(t.title_ro)}</div>
      <div class="summary">${escapeHtml(t.summary)}</div>
      <div class="progress-mini">
        <span>${exDone}/${t.exercises.length}</span>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;"></div></div>
        <span>${pct}%</span>
      </div>
    `;
    card.addEventListener("click", () => openTopic(t.id));
    grid.appendChild(card);
  });
}

function openTopic(id) {
  currentTopic = TOPICS.find(t => t.id === id);
  if (!currentTopic) return;
  currentExIdx = 0;
  document.getElementById("view-list").style.display = "none";
  document.getElementById("view-detail").classList.add("visible");
  document.getElementById("detail-level").textContent = currentTopic.level;
  document.getElementById("detail-level").className = "level-badge level-" + currentTopic.level;
  document.getElementById("detail-cat").textContent = currentTopic.category;
  document.getElementById("detail-title-de").textContent = currentTopic.title_de;
  document.getElementById("detail-title-ro").textContent = currentTopic.title_ro;
  document.getElementById("theory-content").innerHTML = currentTopic.theory;
  // Default to theory tab
  document.querySelectorAll("[data-detail-tab]").forEach(x => {
    x.classList.toggle("active", x.dataset.detailTab === "theory");
  });
  document.getElementById("panel-theory").style.display = "block";
  document.getElementById("panel-exercises").style.display = "none";
  window.scrollTo(0, 0);
  updateExStats();
  renderExercise();
}

function goBackToList() {
  document.getElementById("view-list").style.display = "block";
  document.getElementById("view-detail").classList.remove("visible");
  renderTopicList();
}

document.querySelectorAll("[data-detail-tab]").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll("[data-detail-tab]").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  const tab = b.dataset.detailTab;
  document.getElementById("panel-theory").style.display = tab === "theory" ? "block" : "none";
  document.getElementById("panel-exercises").style.display = tab === "exercises" ? "block" : "none";
  if (tab === "exercises") renderExercise();
}));

// === EXERCISE LOGIC ===
function updateExStats() {
  if (!currentTopic) return;
  const s = stats[currentTopic.id] || { correct: 0, total: 0 };
  document.getElementById("ex-correct").textContent = s.correct;
  document.getElementById("ex-total").textContent = s.total;
  document.getElementById("ex-acc").textContent = (s.total ? Math.round(100 * s.correct / s.total) : 0) + "%";
  const totalEx = currentTopic.exercises.length;
  const done = (progress[currentTopic.id] && Object.keys(progress[currentTopic.id]).length) || 0;
  document.getElementById("ex-progress-fill").style.width = (totalEx ? (100 * done / totalEx) : 0) + "%";
  document.getElementById("ex-counter").textContent = `Exercitiul ${currentExIdx + 1} din ${totalEx}`;
}

// Normalizes exercise to internal format. Accepts both legacy schema
// (prompt/answer/explanation, type=fill|choice|transform|order)
// and new schema (question/correctAnswer/explanationRomanian, type=Lückentext|...)
function normalizeExercise(rawEx) {
  const TYPE_MAP = {
    "Lückentext": "fill",
    "Multiple Choice": "choice",
    "Umformung": "transform",
    "Satzbau": "order",
    "Fehlerkorrektur": "error",
    "Übersetzung": "translate"
  };
  const internalType = TYPE_MAP[rawEx.type] || rawEx.type;
  return {
    type: internalType,
    rawType: rawEx.type,
    prompt: rawEx.question != null ? rawEx.question : rawEx.prompt,
    answer: rawEx.correctAnswer != null ? rawEx.correctAnswer : rawEx.answer,
    options: rawEx.options || null,
    explanation: rawEx.explanationRomanian != null ? rawEx.explanationRomanian : rawEx.explanation,
    hint: rawEx.hint,
    difficulty: rawEx.difficulty || null
  };
}

function renderExercise() {
  if (!currentTopic) return;
  const total = currentTopic.exercises.length;
  if (currentExIdx >= total) {
    showCompletionBanner();
    return;
  }
  const ex = normalizeExercise(currentTopic.exercises[currentExIdx]);
  const content = document.getElementById("ex-content");
  const controls = document.getElementById("ex-controls");
  controls.innerHTML = "";

  const typeLabel = {
    fill: "Completeaza",
    choice: "Alegere multipla",
    transform: "Transforma",
    order: "Ordoneaza cuvintele",
    translate: "Traduce",
    error: "Gaseste greseala"
  }[ex.type] || ex.type;

  // Difficulty badge
  let diffBadge = "";
  if (ex.difficulty) {
    const cls = ex.difficulty.toLowerCase();
    diffBadge = `<span class="ex-difficulty ${cls}">${escapeHtml(ex.difficulty)}</span>`;
  }

  // For error exercises, the "prompt" usually contains the wrong sentence.
  // Try to extract: if prompt contains a quoted sentence, show it specially.
  let promptHtml = escapeHtml(ex.prompt).replace(/\n/g, "<br>");
  let extraHtml = "";
  if (ex.type === "error") {
    // Try to extract the wrong sentence from quotes in the prompt
    const m = ex.prompt.match(/[\""]([^\""]+)[\""]/);
    if (m) {
      const before = ex.prompt.substring(0, m.index).replace(/\n/g, " ").trim();
      promptHtml = escapeHtml(before || "Gaseste greseala si scrie versiunea corecta:");
      extraHtml = `<div class="ex-error-prompt">${escapeHtml(m[1])}</div>`;
    }
  }

  let html = `<div class="ex-card">
    <span class="ex-type">${typeLabel}</span>${diffBadge}
    <div class="ex-prompt">${promptHtml}</div>${extraHtml}`;

  if (ex.type === "fill" || ex.type === "transform" || ex.type === "translate" || ex.type === "error") {
    const placeholder = ex.type === "error" ? "Scrie propozitia corecta..." : "Scrie raspunsul...";
    html += `<input class="ex-input" id="ex-input" autocomplete="off" placeholder="${placeholder}" />`;
  } else if (ex.type === "choice") {
    html += `<div class="ex-options">`;
    const shuffled = ex.options.slice().sort(() => Math.random() - 0.5);
    shuffled.forEach(o => {
      html += `<button class="ex-option" data-val="${escapeAttr(o)}">${escapeHtml(o)}</button>`;
    });
    html += `</div>`;
  } else if (ex.type === "order") {
    html += `<div class="word-built" id="word-built"><span class="word-built-empty">Click pe cuvinte ca sa le adaugi aici</span></div>`;
    html += `<div class="word-pool" id="word-pool"></div>`;
  }

  html += `<div class="ex-feedback" id="ex-feedback"></div></div>`;
  content.innerHTML = html;

  // Wire up
  if (ex.type === "fill" || ex.type === "transform" || ex.type === "translate" || ex.type === "error") {
    setTimeout(() => {
      const inp = document.getElementById("ex-input");
      inp.focus();
      inp.addEventListener("keydown", (e) => { if (e.key === "Enter") checkAnswer(); });
    }, 50);
  } else if (ex.type === "choice") {
    document.querySelectorAll(".ex-option").forEach(b => b.addEventListener("click", () => handleChoice(b)));
  } else if (ex.type === "order") {
    setupOrderExercise(ex);
  }

  // Buttons
  if (ex.type !== "choice") {
    controls.innerHTML = `
      <button class="btn btn-primary" onclick="checkAnswer()">Verifica</button>
      ${ex.hint ? `<button class="btn btn-warning" onclick="showHint()">Indiciu</button>` : ""}
      <button class="btn btn-secondary" onclick="revealAnswer()">Arata</button>
      <button class="btn btn-secondary" onclick="skipExercise()">Sari</button>
    `;
  } else {
    controls.innerHTML = `<button class="btn btn-secondary" onclick="skipExercise()">Sari peste</button>`;
  }

  updateExStats();
}

let orderState = null;

function setupOrderExercise(ex) {
  // Words come from options (if provided) or from answer split. ex is already normalized.
  let wordList;
  if (ex.options && ex.options.length) {
    wordList = ex.options.slice();
  } else {
    wordList = ex.answer.split(/\s+/);
  }
  const shuffled = wordList.slice().sort(() => Math.random() - 0.5);
  orderState = { built: [], pool: shuffled.map((w, i) => ({ id: i, text: w })) };
  renderOrderState();
}

function renderOrderState() {
  const pool = document.getElementById("word-pool");
  const built = document.getElementById("word-built");
  if (!pool || !built) return;
  pool.innerHTML = "";
  orderState.pool.forEach(w => {
    if (orderState.built.find(b => b.id === w.id)) return;
    const btn = document.createElement("button");
    btn.className = "word-chip";
    btn.textContent = w.text;
    btn.addEventListener("click", () => {
      orderState.built.push(w);
      renderOrderState();
    });
    pool.appendChild(btn);
  });
  if (orderState.built.length === 0) {
    built.innerHTML = '<span class="word-built-empty">Click pe cuvinte ca sa le adaugi aici</span>';
  } else {
    built.innerHTML = "";
    orderState.built.forEach((w, i) => {
      const btn = document.createElement("button");
      btn.className = "word-chip placed";
      btn.textContent = w.text;
      btn.addEventListener("click", () => {
        orderState.built.splice(i, 1);
        renderOrderState();
      });
      built.appendChild(btn);
    });
  }
}

function handleChoice(btn) {
  const ex = normalizeExercise(currentTopic.exercises[currentExIdx]);
  const isCorrect = btn.dataset.val === ex.answer;
  document.querySelectorAll(".ex-option").forEach(x => {
    x.classList.add("disabled");
    if (x.dataset.val === ex.answer) x.classList.add("correct");
    else if (x === btn && !isCorrect) x.classList.add("incorrect");
  });
  showFeedback(isCorrect, ex);
  recordResult(isCorrect);
}

function normalizeAns(s) {
  return (s || "").trim().toLowerCase()
    .replace(/[ä]/g, "ae").replace(/[ö]/g, "oe").replace(/[ü]/g, "ue").replace(/[ß]/g, "ss")
    .replace(/[âă]/g, "a").replace(/[î]/g, "i").replace(/[şș]/g, "s").replace(/[țţ]/g, "t")
    .replace(/[.,!?;:]/g, "")
    .replace(/\s+/g, " ");
}

function checkAnswer() {
  const ex = normalizeExercise(currentTopic.exercises[currentExIdx]);
  let userAns;
  if (ex.type === "order") {
    userAns = orderState.built.map(w => w.text).join(" ");
  } else {
    const inp = document.getElementById("ex-input");
    userAns = inp.value;
    inp.classList.remove("correct", "incorrect");
  }

  // For "fill" exercises with placeholder pattern (e.g., "stehe ... auf"),
  // we want to allow user to type just the parts separated by space or with "..."
  let correctAns = ex.answer;
  let isCorrect = normalizeAns(userAns) === normalizeAns(correctAns);
  // Special handling: if answer contains "...", check that all parts are present
  if (!isCorrect && correctAns.includes("...")) {
    const parts = correctAns.split("...").map(p => normalizeAns(p)).filter(p => p);
    const userN = normalizeAns(userAns);
    isCorrect = parts.every(p => userN.includes(p));
  }

  if (ex.type !== "order") {
    const inp = document.getElementById("ex-input");
    inp.classList.add(isCorrect ? "correct" : "incorrect");
  }
  showFeedback(isCorrect, ex);
  recordResult(isCorrect);
}

function showFeedback(isCorrect, ex) {
  const fb = document.getElementById("ex-feedback");
  fb.classList.add("show");
  fb.classList.toggle("correct", isCorrect);
  fb.classList.toggle("incorrect", !isCorrect);
  let html = isCorrect ? "Corect!" : `Raspuns asteptat: <strong>${escapeHtml(ex.answer)}</strong>`;
  if (ex.explanation) html += `<small>${escapeHtml(ex.explanation)}</small>`;
  fb.innerHTML = html;

  // Add "Next" button to controls
  const controls = document.getElementById("ex-controls");
  controls.innerHTML = `<button class="btn btn-success" onclick="nextExercise()" id="next-btn">Urmator &raquo;</button>`;
  setTimeout(() => document.getElementById("next-btn").focus(), 50);
}

function showHint() {
  const ex = normalizeExercise(currentTopic.exercises[currentExIdx]);
  const fb = document.getElementById("ex-feedback");
  fb.classList.add("show");
  fb.style.background = "#fef3c7";
  fb.style.color = "#92400e";
  fb.innerHTML = `Indiciu: <strong>${escapeHtml(ex.hint)}</strong>`;
}

function revealAnswer() {
  const ex = normalizeExercise(currentTopic.exercises[currentExIdx]);
  const fb = document.getElementById("ex-feedback");
  fb.classList.add("show", "incorrect");
  fb.innerHTML = `Raspuns: <strong>${escapeHtml(ex.answer)}</strong>${ex.explanation ? `<small>${escapeHtml(ex.explanation)}</small>` : ""}`;
  recordResult(false);
  document.getElementById("ex-controls").innerHTML = `<button class="btn btn-success" onclick="nextExercise()">Urmator &raquo;</button>`;
}

function skipExercise() {
  // Don't record result
  const id = currentTopic.id;
  progress[id] = progress[id] || {};
  progress[id][currentExIdx] = "skipped";
  saveJSON(STORAGE.progress, progress);
  nextExercise();
}

function recordResult(isCorrect) {
  const id = currentTopic.id;
  // Only count first attempt for stats
  const wasAlreadyDone = progress[id] && progress[id][currentExIdx];
  progress[id] = progress[id] || {};
  progress[id][currentExIdx] = isCorrect ? "correct" : "incorrect";
  saveJSON(STORAGE.progress, progress);

  if (!wasAlreadyDone) {
    stats[id] = stats[id] || { correct: 0, total: 0 };
    stats[id].total++;
    if (isCorrect) stats[id].correct++;
    saveJSON(STORAGE.stats, stats);
  }
  updateExStats();
}

function nextExercise() {
  currentExIdx++;
  renderExercise();
}

function showCompletionBanner() {
  const id = currentTopic.id;
  const s = stats[id] || { correct: 0, total: 0 };
  const acc = s.total ? Math.round(100 * s.correct / s.total) : 0;
  document.getElementById("ex-content").innerHTML = `
    <div class="complete-banner">
      <h3>Bravo! Ai terminat toate exercitiile!</h3>
      <p>Acuratete: <strong>${acc}%</strong> (${s.correct} din ${s.total})</p>
    </div>
  `;
  document.getElementById("ex-controls").innerHTML = `
    <button class="btn btn-primary" onclick="restartExercises()">Reia toate exercitiile</button>
    <button class="btn btn-secondary" onclick="goBackToList()">Inapoi la topicuri</button>
  `;
}

function restartExercises() {
  delete progress[currentTopic.id];
  saveJSON(STORAGE.progress, progress);
  currentExIdx = 0;
  renderExercise();
}

// === UTILS ===
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// === BOOT ===
populateCategorySelect();
renderTopicList();
</script>
</body>
</html>
