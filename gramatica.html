, ___ wir die Pruefung bestehen wollen. (pentru ca = scop)","options":null,"correctAnswer":"damit","explanationRomanian":"damit = ca sa (scop). Modal 'wollen' la sfarsitul absolut."},{"id":"nb-505","type":"Lückentext","difficulty":"Usor","question":"Ich weiss, ___ er Deutsch spricht. (ca)","options":null,"correctAnswer":"dass","explanationRomanian":"dass + verb la sfarsit. Diferit de 'das' (articol)!"},{"id":"nb-506","type":"Lückentext","difficulty":"Mediu","question":"___ es regnet, gehe ich nicht aus. (daca)","options":null,"correctAnswer":"Wenn","explanationRomanian":"Subordonata prima cu 'wenn' + verb la sfarsit. Apoi V principal imediat dupa virgula."},{"id":"nb-507","type":"Lückentext","difficulty":"Greu","question":"Er ist mude, ___ er gut geschlafen hat. (desi)","options":null,"correctAnswer":"obwohl","explanationRomanian":"obwohl + ... + auxiliar 'hat' la sfarsit (Perfekt: gut geschlafen hat)."},{"id":"nb-508","type":"Multiple Choice","difficulty":"Usor","question":"Care arata o CAUZA?","options":["weil","dass","wenn","obwohl"],"correctAnswer":"weil","explanationRomanian":"weil = deoarece (cauza). dass = ca; wenn = cand; obwohl = desi."},{"id":"nb-509","type":"Multiple Choice","difficulty":"Mediu","question":"Care arata UN SCOP (ca sa)?","options":["weil","damit","wenn","obwohl"],"correctAnswer":"damit","explanationRomanian":"damit = ca sa (scop). Cere subiecte diferite sau modal."},{"id":"nb-510","type":"Multiple Choice","difficulty":"Usor","question":"In subordonata, verbul conjugat merge:","options":["pe pozitia 1","pe pozitia 2","imediat dupa subiect","la sfarsit"],"correctAnswer":"la sfarsit","explanationRomanian":"REGULA DE AUR: in TOATE subordonatele verbul conjugat la SFARSIT."},{"id":"nb-511","type":"Multiple Choice","difficulty":"Mediu","question":"Care e CORECT? 'Stau acasa pentru ca sunt bolnav.'","options":["Ich bleibe, weil ich krank bin","Ich bleibe, weil bin ich krank","Ich bleibe, weil ich bin krank","Ich bleibe, denn ich bin krank"],"correctAnswer":"Ich bleibe, weil ich krank bin","explanationRomanian":"weil + S + V la sfarsit. NOTA: 'denn' (caci) NU e subordonata, are alta topica."},{"id":"nb-512","type":"Multiple Choice","difficulty":"Greu","question":"Care e diferenta wenn vs als?","options":["nu exista diferenta","wenn = repetat/viitor, als = o data in trecut","wenn = trecut, als = viitor","wenn = formal, als = informal"],"correctAnswer":"wenn = repetat/viitor, als = o data in trecut","explanationRomanian":"'als ich Kind war' (cand eram copil - o singura data). 'wenn ich Zeit habe' (cand am timp - posibil repetat)."},{"id":"nb-513","type":"Multiple Choice","difficulty":"Greu","question":"Cu Perfekt, auxiliarul merge:","options":["pe poz. 2","inainte de Partizip","la sfarsit dupa Partizip","in mijloc"],"correctAnswer":"la sfarsit dupa Partizip","explanationRomanian":"Ex: 'weil ich gestern gearbeitet habe' - habe la sfarsit absolut."},{"id":"nb-514","type":"Multiple Choice","difficulty":"Mediu","question":"Subordonata prima -> verbul principal vine:","options":["la sfarsit","imediat dupa virgula","pe poz. 3","dupa subiect"],"correctAnswer":"imediat dupa virgula","explanationRomanian":"Wenn es regnet, BLEIBE ich. - V principal imediat dupa virgula (inversiune)."},{"id":"nb-515","type":"Multiple Choice","difficulty":"Mediu","question":"Care e GRESIT?","options":["Ich denke, dass er kommt","Ich denke, dass kommt er","Ich denke, dass er morgen kommt","Ich denke, dass er gut spricht"],"correctAnswer":"Ich denke, dass kommt er","explanationRomanian":"Verbul 'kommt' trebuie la SFARSIT, nu imediat dupa 'dass'."},{"id":"nb-516","type":"Satzbau","difficulty":"Mediu","question":"Ordoneaza cuvintele:","options":["weil","Ich bleibe zu Hause,","ich","bin","krank"],"correctAnswer":"Ich bleibe zu Hause, weil ich krank bin","explanationRomanian":"weil + S + adj/complement + V la sfarsit (bin). Topica: weil ich krank bin."},{"id":"nb-517","type":"Satzbau","difficulty":"Mediu","question":"Ordoneaza cuvintele:","options":["Zeit","Ich rufe dich an,","wenn","ich","habe"],"correctAnswer":"Ich rufe dich an, wenn ich Zeit habe","explanationRomanian":"wenn + S + obiect + V la sfarsit (habe). 'Zeit haben' = a avea timp."},{"id":"nb-518","type":"Satzbau","difficulty":"Mediu","question":"Ordoneaza cuvintele:","options":["er","dass","kommt","Ich glaube,","morgen"],"correctAnswer":"Ich glaube, dass er morgen kommt","explanationRomanian":"dass + S + adverb temporal + V la sfarsit (kommt)."},{"id":"nb-519","type":"Satzbau","difficulty":"Mediu","question":"Ordoneaza cuvintele:","options":["sie","obwohl","Sie kommt,","muede","ist"],"correctAnswer":"Sie kommt, obwohl sie muede ist","explanationRomanian":"obwohl + S + adj + V la sfarsit (ist)."},{"id":"nb-520","type":"Satzbau","difficulty":"Greu","question":"Ordoneaza cuvintele:","options":["regnet,","ich","es","Wenn","bleibe","zu","Hause"],"correctAnswer":"Wenn es regnet, bleibe ich zu Hause","explanationRomanian":"Subordonata prima: Wenn + S + V (regnet) la sfarsit + virgula. Apoi V principal (bleibe) imediat dupa virgula. Inversiune: bleibe ich (V-S)."},{"id":"nb-521","type":"Satzbau","difficulty":"Greu","question":"Ordoneaza cuvintele:","options":["habe,","viel","ich","muede","weil","Ich bin","gearbeitet"],"correctAnswer":"Ich bin muede, weil ich viel gearbeitet habe","explanationRomanian":"Cu Perfekt in subordonata: weil + S + complement + Partizip + auxiliar (habe) la SFARSIT absolut."},{"id":"nb-522","type":"Fehlerkorrektur","difficulty":"Mediu","question":"Greseala. Scrie corect:\n\"Ich bleibe zu Hause, weil bin ich krank.\"","options":null,"correctAnswer":"Ich bleibe zu Hause, weil ich krank bin","explanationRomanian":"weil cere V la sfarsit. Forma corecta: weil + S + ... + V (bin) la final."},{"id":"nb-523","type":"Fehlerkorrektur","difficulty":"Mediu","question":"Greseala. Scrie corect:\n\"Ich denke, dass er kommt morgen.\"","options":null,"correctAnswer":"Ich denke, dass er morgen kommt","explanationRomanian":"dass + V la SFARSIT. Adverbul 'morgen' inainte de verb."},{"id":"nb-524","type":"Fehlerkorrektur","difficulty":"Greu","question":"Greseala. Scrie corect:\n\"Wenn ich Zeit habe, ich rufe dich an.\"","options":null,"correctAnswer":"Wenn ich Zeit habe, rufe ich dich an","explanationRomanian":"Subordonata prima -> inversiune in principala: V (rufe) + S (ich), nu S + V."},{"id":"nb-525","type":"Fehlerkorrektur","difficulty":"Mediu","question":"Greseala. Scrie corect:\n\"Sie kommt, obwohl sie ist krank.\"","options":null,"correctAnswer":"Sie kommt, obwohl sie krank ist","explanationRomanian":"obwohl + S + complement + V la final (ist). Nu 'sie ist krank'."},{"id":"nb-526","type":"Fehlerkorrektur","difficulty":"Greu","question":"Greseala. Scrie corect:\n\"Ich lerne, weil ich gut sprechen will Deutsch.\"","options":null,"correctAnswer":"Ich lerne, weil ich gut Deutsch sprechen will","explanationRomanian":"Cu modal in subordonata: complement + INFINITIV + MODAL la sfarsit absolut. 'sprechen will' la final."},{"id":"nb-527","type":"Fehlerkorrektur","difficulty":"Mediu","question":"Greseala. Scrie corect:\n\"Ich bin muede, weil habe ich gearbeitet.\"","options":null,"correctAnswer":"Ich bin muede, weil ich gearbeitet habe","explanationRomanian":"Cu Perfekt in subordonata: S + Partizip + auxiliar (habe) la sfarsit absolut."},{"id":"nb-528","type":"Umformung","difficulty":"Mediu","question":"Combina cu 'weil':\n\"Ich gehe nicht aus. Es regnet.\"","options":null,"correctAnswer":"Ich gehe nicht aus, weil es regnet","explanationRomanian":"weil = a doua propozitie cu V la sfarsit. 'Es regnet' deja are V la sfarsit caci e scurt."},{"id":"nb-529","type":"Umformung","difficulty":"Mediu","question":"Combina cu 'dass':\n\"Sie sagt: Ich komme morgen.\"","options":null,"correctAnswer":"Sie sagt, dass sie morgen kommt","explanationRomanian":"dass + S (sie) + adverb (morgen) + V la sfarsit (kommt)."},{"id":"nb-530","type":"Umformung","difficulty":"Mediu","question":"Combina cu 'wenn':\n\"Ich rufe dich an. Ich habe Zeit.\"","options":null,"correctAnswer":"Ich rufe dich an, wenn ich Zeit habe","explanationRomanian":"wenn + S + obiect + V la final."},{"id":"nb-531","type":"Umformung","difficulty":"Greu","question":"Inverseaza ordinea (subordonata prima):\n\"Ich bleibe zu Hause, weil ich krank bin.\"","options":null,"correctAnswer":"Weil ich krank bin, bleibe ich zu Hause","explanationRomanian":"Subordonata prima -> V principal (bleibe) imediat dupa virgula + S (ich)."},{"id":"nb-532","type":"Umformung","difficulty":"Mediu","question":"Combina cu 'obwohl':\n\"Sie kommt. Sie ist muede.\"","options":null,"correctAnswer":"Sie kommt, obwohl sie muede ist","explanationRomanian":"obwohl + S + adj + V la final (ist)."},{"id":"nb-533","type":"Umformung","difficulty":"Greu","question":"Combina cu 'damit':\n\"Ich lerne. Ich will gut sprechen.\"","options":null,"correctAnswer":"Ich lerne, damit ich gut sprechen will","explanationRomanian":"damit + S + complement + INFINITIV + MODAL la final (sprechen will)."}]},{"id":"perfekt","level":"A2","category":"Verbe","title_de":"Perfekt (haben/sein + Partizip II)","title_ro":"Timpul Perfect","summary":"Timpul trecut cel mai folosit in germana vorbita. Format din auxiliar (haben/sein) + participiu trecut.","theory":"\n<h3>Formula generala</h3>\n<p class=\"gram-example\"><strong>Subiect + haben/sein (poz. 2) + ... + Partizip II (la sfarsit)</strong></p>\n<p>Exemplu: <em>Ich <strong>habe</strong> gestern Pizza <strong>gegessen</strong>.</em> (Am mancat pizza ieri.)</p>\n\n<h3>haben sau sein? -- regula simpla</h3>\n<table class=\"gram-table\">\n  <thead><tr><th>Folosesti SEIN cand...</th><th>Folosesti HABEN in rest</th></tr></thead>\n  <tbody>\n    <tr>\n      <td>\n        <ul>\n          <li>verb de <strong>miscare</strong> (gehen, fahren, kommen, fliegen, laufen, schwimmen)</li>\n          <li>verb de <strong>schimbare de stare</strong> (aufstehen, einschlafen, sterben, werden, aufwachen)</li>\n          <li><strong>sein</strong> insusi (ich bin gewesen)</li>\n          <li><strong>bleiben</strong> (a ramane), <strong>passieren</strong> (a se intampla)</li>\n        </ul>\n      </td>\n      <td>\n        Aproape toate celelalte verbe.<br>\n        Verbe tranzitive (cu obiect direct): essen, trinken, kaufen, sehen, lesen.<br>\n        Verbe modale: ich habe gemusst.<br>\n        Verbe reflexive: ich habe mich gefreut.\n      </td>\n    </tr>\n  </tbody>\n</table>\n\n<h3>Cum formez Partizip II?</h3>\n<h4>Verbe regulate (slabe): ge- + radacina + -t</h4>\n<ul>\n  <li>spielen -> <strong>gespielt</strong>: Ich habe Fussball gespielt.</li>\n  <li>kaufen -> <strong>gekauft</strong>: Ich habe Brot gekauft.</li>\n  <li>arbeiten -> <strong>gearbeitet</strong>: Ich habe gearbeitet.</li>\n</ul>\n\n<h4>Verbe neregulate (tari): ge- + radacina (modificata) + -en</h4>\n<p>Trebuie invatate pe de rost! Cele mai frecvente:</p>\n<table class=\"gram-table\">\n  <thead><tr><th>Infinitiv</th><th>Partizip II</th><th>Auxiliar</th></tr></thead>\n  <tbody>\n    <tr><td>gehen (a merge)</td><td>gegangen</td><td><strong>sein</strong></td></tr>\n    <tr><td>fahren (a calatori)</td><td>gefahren</td><td><strong>sein</strong></td></tr>\n    <tr><td>kommen (a veni)</td><td>gekommen</td><td><strong>sein</strong></td></tr>\n    <tr><td>essen (a manca)</td><td>gegessen</td><td>haben</td></tr>\n    <tr><td>trinken (a bea)</td><td>getrunken</td><td>haben</td></tr>\n    <tr><td>sehen (a vedea)</td><td>gesehen</td><td>haben</td></tr>\n    <tr><td>lesen (a citi)</td><td>gelesen</td><td>haben</td></tr>\n    <tr><td>sein (a fi)</td><td>gewesen</td><td><strong>sein</strong></td></tr>\n    <tr><td>haben (a avea)</td><td>gehabt</td><td>haben</td></tr>\n    <tr><td>schreiben</td><td>geschrieben</td><td>haben</td></tr>\n  </tbody>\n</table>\n\n<h4>Verbe cu prefixe inseparabile (be-, er-, ver-, ge-, ent-, emp-, zer-, miss-)</h4>\n<p>NU primesc \"ge-\": besuchen -> <strong>besucht</strong>, verstehen -> <strong>verstanden</strong>, bekommen -> <strong>bekommen</strong>.</p>\n\n<h4>Verbe terminate in -ieren</h4>\n<p>NU primesc \"ge-\": studieren -> <strong>studiert</strong>, telefonieren -> <strong>telefoniert</strong>.</p>\n\n<h3>Verbe separabile la Perfect</h3>\n<p>Prefixul ramane lipit de Partizip, iar \"ge-\" se baga intre prefix si radacina:</p>\n<ul>\n  <li>einkaufen -> <strong>eingekauft</strong>: Ich habe eingekauft.</li>\n  <li>aufstehen -> <strong>aufgestanden</strong>: Ich bin aufgestanden.</li>\n</ul>\n\n<div class=\"gram-tip\">\n<strong>Sfat:</strong> In germana vorbita, oamenii folosesc Perfekt pentru aproape orice trecut, chiar pentru \"yesterday I had breakfast\". Präteritum (ich ass = am mancat) e folosit mai mult la sein/haben/modale si in scris.\n</div>\n","exercises":[{"type":"fill","prompt":"Gestern ___ ich Pizza gegessen.","answer":"habe","hint":"essen = verb cu obiect = haben","explanation":"Pizza este obiect direct -> haben. Forma: ich habe gegessen."},{"type":"fill","prompt":"Ich ___ nach Berlin gefahren.","answer":"bin","hint":"fahren = miscare = sein","explanation":"fahren e verb de miscare -> sein. Forma: ich bin gefahren."},{"type":"transform","prompt":"Trecut: Ich kaufe Brot.","answer":"Ich habe Brot gekauft.","hint":"kaufen + haben + Partizip","explanation":"kaufen (regulat) -> gekauft. Cu haben."},{"type":"transform","prompt":"Trecut: Wir gehen ins Kino.","answer":"Wir sind ins Kino gegangen.","hint":"gehen = miscare = sein, neregulat","explanation":"gehen e neregulat -> gegangen. Cu sein (miscare)."},{"type":"choice","prompt":"Maria ___ gestern in Italien gewesen.","options":["hat","ist","war","hatte"],"answer":"ist","explanation":"Verbul 'sein' la Perfect ia tot 'sein' ca auxiliar: sie ist gewesen."},{"type":"fill","prompt":"Wir ___ einen Film gesehen.","answer":"haben","hint":"sehen + obiect direct = haben","explanation":"sehen + einen Film (Akk) -> haben. Forma: wir haben gesehen."}]},{"id":"reflexive","level":"A2","category":"Verbe","title_de":"Reflexive Verben","title_ro":"Verbe reflexive (sich)","summary":"Verbe care au pronume reflexiv 'sich' (= pe sine, isi). Pronumele se schimba cu fiecare persoana.","theory":"\n<h3>Ce sunt verbele reflexive?</h3>\n<p>Verbe care exprima ca actiunea se intoarce catre subiect. In dictionar apar cu <strong>sich</strong>:</p>\n<ul>\n  <li><strong>sich freuen</strong> = a se bucura</li>\n  <li><strong>sich waschen</strong> = a se spala</li>\n  <li><strong>sich anziehen</strong> = a se imbraca</li>\n  <li><strong>sich treffen</strong> = a se intalni</li>\n  <li><strong>sich erinnern</strong> = a-si aminti</li>\n  <li><strong>sich beeilen</strong> = a se grabi</li>\n</ul>\n\n<h3>Pronumele reflexiv -- la Akkusativ</h3>\n<table class=\"gram-table\">\n  <thead><tr><th>Persoana</th><th>Pronume reflexiv</th></tr></thead>\n  <tbody>\n    <tr><td>ich</td><td><strong>mich</strong></td></tr>\n    <tr><td>du</td><td><strong>dich</strong></td></tr>\n    <tr><td>er/sie/es</td><td><strong>sich</strong></td></tr>\n    <tr><td>wir</td><td><strong>uns</strong></td></tr>\n    <tr><td>ihr</td><td><strong>euch</strong></td></tr>\n    <tr><td>sie/Sie</td><td><strong>sich</strong></td></tr>\n  </tbody>\n</table>\n\n<h3>Pozitia in propozitie</h3>\n<p>Pronumele reflexiv vine <strong>imediat dupa verbul conjugat</strong>:</p>\n<p class=\"gram-example\">Ich freue <strong>mich</strong> sehr.<br>(Ma bucur foarte mult.)</p>\n<p class=\"gram-example\">Wir treffen <strong>uns</strong> um 19 Uhr.<br>(Ne intalnim la ora 19.)</p>\n\n<h3>Conjugare completa: sich freuen</h3>\n<table class=\"gram-table\">\n  <tbody>\n    <tr><td>ich freue mich</td><td>ma bucur</td></tr>\n    <tr><td>du freust dich</td><td>te bucuri</td></tr>\n    <tr><td>er/sie/es freut sich</td><td>se bucura</td></tr>\n    <tr><td>wir freuen uns</td><td>ne bucuram</td></tr>\n    <tr><td>ihr freut euch</td><td>va bucurati</td></tr>\n    <tr><td>sie/Sie freuen sich</td><td>se bucura</td></tr>\n  </tbody>\n</table>\n\n<h3>La Perfekt</h3>\n<p>Verbele reflexive folosesc <strong>haben</strong> ca auxiliar, iar pronumele reflexiv vine inainte:</p>\n<p class=\"gram-example\">Ich <strong>habe mich</strong> gefreut. (M-am bucurat.)<br>\nDu <strong>hast dich</strong> gewaschen. (Te-ai spalat.)</p>\n\n<h3>Reflexiv la Dativ -- partile corpului</h3>\n<p>Cand spalam o parte din corp (\"imi spal mainile\"), folosim Dativ + obiect direct la Akk:</p>\n<p class=\"gram-example\">Ich wasche <strong>mir</strong> (Dat.) <strong>die Hände</strong> (Akk.).<br>(Imi spal mainile.)</p>\n<p>Pronumele reflexiv la Dativ: mir, dir, sich, uns, euch, sich.</p>\n\n<div class=\"gram-tip\">\n<strong>Sfat:</strong> in romana spunem \"ma bucur\" cu un cuvant + pronume. In germana e identic ca structura, doar ca scrii \"ich freue mich\" -- gandeste-te ca \"mich\" inseamna \"(pe) mine\".\n</div>\n","exercises":[{"type":"fill","prompt":"Ich freue ___ auf das Wochenende.","answer":"mich","hint":"ich + reflexiv Akk","explanation":"ich -> mich. (Ma bucur de weekend.)"},{"type":"fill","prompt":"Wir treffen ___ um 18 Uhr.","answer":"uns","hint":"wir + reflexiv","explanation":"wir -> uns. (Ne intalnim la 18.)"},{"type":"choice","prompt":"Er erinnert ___ an die Reise.","options":["mich","dich","sich","uns"],"answer":"sich","explanation":"er/sie/es -> sich. (El isi aminteste de calatorie.)"},{"type":"fill","prompt":"Ihr beeilt ___, der Bus kommt!","answer":"euch","hint":"ihr + reflexiv","explanation":"ihr -> euch. (Va grabiti, vine autobuzul!)"},{"type":"transform","prompt":"Trecut (Perfekt): Ich freue mich.","answer":"Ich habe mich gefreut.","hint":"haben + mich + gefreut","explanation":"Reflexive iau 'haben'. Forma: subiect + haben + reflexiv + Partizip."},{"type":"fill","prompt":"Du wäschst ___ die Hände.","answer":"dir","hint":"Dativ! pentru ca die Hände e obiect direct","explanation":"Cand obiectul direct (Hände) e prezent, reflexivul merge la Dativ: du -> dir."}]},{"id":"trennbare","level":"A2","category":"Verbe","title_de":"Trennbare Verben","title_ro":"Verbe separabile","summary":"Verbe cu prefix care 'se desprinde' la prezent si Imperfekt, dar revine la sfarsitul propozitiei.","theory":"\n<h3>Ce sunt verbele separabile?</h3>\n<p>Verbe germane formate dintr-un prefix + verb baza. La prezent, prefixul se DESPRINDE si zboara la sfarsit:</p>\n<p class=\"gram-example\">Infinitiv: <strong>ein</strong>kaufen (a face cumparaturi)<br>\nConjugat: Ich <strong>kaufe</strong> jeden Tag <strong>ein</strong>. (Fac cumparaturi in fiecare zi.)</p>\n\n<h3>Cele mai frecvente prefixe separabile</h3>\n<table class=\"gram-table\">\n  <thead><tr><th>Prefix</th><th>Sens</th><th>Exemplu</th></tr></thead>\n  <tbody>\n    <tr><td><strong>an-</strong></td><td>spre, la</td><td>anrufen (a suna), ankommen (a sosi)</td></tr>\n    <tr><td><strong>auf-</strong></td><td>sus, deschis</td><td>aufstehen (a se ridica), aufmachen (a deschide)</td></tr>\n    <tr><td><strong>aus-</strong></td><td>din, afara</td><td>ausgehen (a iesi), ausziehen (a se dezbraca)</td></tr>\n    <tr><td><strong>ein-</strong></td><td>in, inauntru</td><td>einkaufen, einsteigen (a urca in)</td></tr>\n    <tr><td><strong>mit-</strong></td><td>impreuna</td><td>mitkommen (a veni cu), mitnehmen (a lua cu)</td></tr>\n    <tr><td><strong>weg-</strong></td><td>departe</td><td>weggehen (a pleca), wegfahren</td></tr>\n    <tr><td><strong>zurück-</strong></td><td>inapoi</td><td>zurückkommen (a se intoarce)</td></tr>\n    <tr><td><strong>fern-</strong></td><td>departe</td><td>fernsehen (a se uita la TV)</td></tr>\n  </tbody>\n</table>\n\n<h3>Cum stiu ca un prefix e separabil?</h3>\n<p>Regula: <strong>daca accentul cade pe prefix, e separabil</strong>. <em>'AN</em>rufen, <em>'EIN</em>kaufen, <em>'AUF</em>stehen.</p>\n<p>Inseparabile (NU se separa): be-, er-, ver-, ge-, ent-, emp-, zer-, miss-. Aici accentul cade pe radacina: be<em>'SU</em>chen.</p>\n\n<h3>Cele 4 contexte cu schimbari diferite</h3>\n\n<h4>1. Prezent (separat)</h4>\n<p class=\"gram-example\">Ich <strong>rufe</strong> dich morgen <strong>an</strong>. (Te sun maine.)</p>\n\n<h4>2. Cu verb modal (NEseparat, la sfarsit)</h4>\n<p class=\"gram-example\">Ich muss morgen früh <strong>aufstehen</strong>. (Trebuie sa ma scol devreme maine.)</p>\n<p>Cu modal, infinitivul ramane intreg la sfarsit.</p>\n\n<h4>3. Perfekt (Partizip II are 'ge' la mijloc)</h4>\n<p class=\"gram-example\">Ich habe gestern <strong>eingekauft</strong>. (Am facut cumparaturi ieri.)</p>\n<p>einkaufen -> ein + ge + kauf + t = eingekauft.</p>\n\n<h4>4. Subordonata (NEseparat la sfarsit)</h4>\n<p class=\"gram-example\">Ich glaube, dass er morgen <strong>ankommt</strong>.<br>(Cred ca soseste maine.)</p>\n\n<div class=\"gram-tip\">\n<strong>Mnemonic:</strong> \"ein-kauf-ein\" -- prefixul ein se desparte si zboara la sfarsit ca un boomerang. La Perfekt se reuneste in 'eingekauft'.\n</div>\n","exercises":[{"type":"transform","prompt":"Conjuga la prezent: anrufen / ich / dich","answer":"Ich rufe dich an","hint":"prefixul 'an' la sfarsit","explanation":"anrufen -> ich rufe ... an. Prefixul zboara la final."},{"type":"fill","prompt":"Ich ___ jeden Morgen um 7 Uhr ___ . (aufstehen)","answer":"stehe ... auf","hint":"doua parti","explanation":"aufstehen -> ich stehe auf. Verbul se desparte la prezent."},{"type":"transform","prompt":"Perfekt: Ich kaufe ein.","answer":"Ich habe eingekauft.","hint":"ein + ge + kauft","explanation":"Verb separabil la Perfekt: prefixul + ge + radacina + t = eingekauft."},{"type":"fill","prompt":"Wann ___ der Zug ___? (ankommen - sosi)","answer":"kommt ... an","hint":"intrebare cu prefix la sfarsit","explanation":"Wann kommt der Zug an? La intrebare verbul e pe pozitia 1, prefixul la sfarsit."},{"type":"choice","prompt":"Ich muss morgen früh ___.","options":["stehe auf","aufstehen","stand auf","aufgestanden"],"answer":"aufstehen","explanation":"Cu verb modal (muss), verbul principal ramane infinitiv intreg la sfarsit."},{"type":"order","prompt":"Ordoneaza: an / die / Tür / mache / ich","answer":"Ich mache die Tür an","hint":"prefixul la sfarsit","explanation":"Subiect + verb + obiect + prefix. Note: aufmachen e mai natural pentru deschis usa, aici e doar exercitiu."}]},{"id":"verben-praepositionen","level":"A2","category":"Verbe","title_de":"Verben mit Präpositionen","title_ro":"Verbe cu prepozitii fixe","summary":"75+ verbe care vin cu o prepozitie obligatorie (ex. denken AN, warten AUF, sich freuen ÜBER). Se invata ca unitati fixe.","theory":"\n<h3>Ce sunt verbele cu prepozitii fixe?</h3>\n<p>In germana, multe verbe vin cu o <strong>prepozitie obligatorie</strong> care nu se schimba. Aceasta combinatie verb + prepozitie functioneaza ca o unitate fixa si trebuie invatata <strong>impreuna</strong>, ca o singura \"felie\" de vocabular.</p>\n<p>Asemanator cu romana: zicem \"ma gandesc <em>la</em>\" (nu \"ma gandesc pe\"). In germana exista aceeasi logica, doar ca prepozitiile sunt diferite: <em>denken AN</em>, <em>warten AUF</em>, <em>sich freuen ÜBER</em>.</p>\n\n<div class=\"gram-tip\">\n<strong>Sfat de aur:</strong> NU traduce verbul si prepozitia separat. Inveti perechea ca o singura unitate. Cand auzi \"ma astept la\" -> \"rechnen <em>mit</em>\", \"ma plang de\" -> \"sich beschweren <em>über</em>\".\n</div>\n\n<h3>Cazul (Akkusativ vs Dativ)</h3>\n<p>Fiecare verb + prepozitie cere un anumit caz. Vestea buna: la A2, prioritatea e sa stii <strong>care prepozitie</strong> merge cu care verb. Cazul vine cu practica.</p>\n<p>Pattern util: prepozitiile <strong>aus, bei, mit, nach, von, zu</strong> cer mereu <strong>Dativ</strong>. Prepozitiile <strong>für, um, gegen</strong> cer mereu <strong>Akkusativ</strong>. Prepozitiile <strong>an, auf, in, über</strong> sunt Wechselpräpositionen (depinde de verb).</p>\n\n<h3>Cele mai importante perechi de retinut</h3>\n\n<h4>1. sich freuen AUF vs sich freuen ÜBER (a se bucura)</h4>\n<ul>\n  <li><strong>auf + Akk.</strong> = bucurie pentru ceva DIN VIITOR (abia astept). <em>\"Ich freue mich AUF den Urlaub.\"</em> (Abia astept vacanta.)</li>\n  <li><strong>über + Akk.</strong> = bucurie pentru ceva DEJA INTAMPLAT. <em>\"Ich freue mich ÜBER das Geschenk.\"</em> (Ma bucur de cadou.)</li>\n</ul>\n\n<h4>2. sprechen MIT vs sprechen ÜBER (a vorbi)</h4>\n<ul>\n  <li><strong>mit + Dat.</strong> = vorbesti CU CINEVA (persoana). <em>\"Ich spreche mit meinem Bruder.\"</em></li>\n  <li><strong>über + Akk.</strong> = vorbesti DESPRE CEVA (subiect). <em>\"Wir sprechen über das Wetter.\"</em></li>\n</ul>\n\n<h4>3. erzählen VON vs erzählen ÜBER (a povesti)</h4>\n<ul>\n  <li><strong>von + Dat.</strong> = ceva personal, amintiri. <em>\"Oma erzählt von früher.\"</em></li>\n  <li><strong>über + Akk.</strong> = subiect general, obiectiv. <em>\"Sie erzählt über ihre Arbeit.\"</em></li>\n</ul>\n\n<h4>4. danken FÜR vs sich bedanken BEI (a multumi)</h4>\n<ul>\n  <li><strong>danken FÜR + Akk.</strong> = multumesti PENTRU ceva (lucrul). <em>\"Ich danke dir für das Geschenk.\"</em></li>\n  <li><strong>sich bedanken BEI + Dat.</strong> = multumesti FATA DE cineva (persoana). <em>\"Ich bedanke mich bei dir.\"</em></li>\n</ul>\n\n<h4>5. kämpfen FÜR / UM / GEGEN (a lupta)</h4>\n<ul>\n  <li><strong>für + Akk.</strong> = pentru o cauza/idee. <em>\"kämpfen für die Freiheit\"</em></li>\n  <li><strong>um + Akk.</strong> = pentru a obtine ceva concret. <em>\"kämpfen um den ersten Platz\"</em></li>\n  <li><strong>gegen + Akk.</strong> = impotriva cuiva. <em>\"kämpfen gegen die Ungerechtigkeit\"</em></li>\n</ul>\n\n<h4>6. sich interessieren FÜR vs sich interessieren AN</h4>\n<ul>\n  <li><strong>für + Akk.</strong> = interes general (sport, muzica). Mai frecvent. <em>\"Ich interessiere mich für Musik.\"</em></li>\n  <li><strong>an + Dat.</strong> = interes specific. <em>\"Ich bin an diesem Auto interessiert.\"</em></li>\n</ul>\n\n<h4>7. bestehen AUS vs bestehen AUF (a fi compus / a insista)</h4>\n<ul>\n  <li><strong>aus + Dat.</strong> = a fi compus DIN. <em>\"Das Team besteht aus zehn Personen.\"</em></li>\n  <li><strong>auf + Dat.</strong> = a insista PE. <em>\"Er besteht auf seinem Recht.\"</em></li>\n</ul>\n\n<h4>8. sorgen FÜR vs sich sorgen UM (a avea grija / a fi ingrijorat)</h4>\n<ul>\n  <li><strong>für + Akk.</strong> = a se ingriji activ. <em>\"Ich sorge für meine Familie.\"</em></li>\n  <li><strong>sich sorgen + um + Akk.</strong> = a fi ingrijorat (anxios). <em>\"Ich sorge mich um dich.\"</em></li>\n</ul>\n\n<h3>Tabel de referinta - cele mai importante 30 verbe A2</h3>\n<table class=\"gram-table\">\n  <thead><tr><th>Verb</th><th>Prep.</th><th>Caz</th><th>Sens romana</th></tr></thead>\n  <tbody>\n    <tr><td>denken</td><td>an</td><td>Akk.</td><td>a se gandi la</td></tr>\n    <tr><td>sich erinnern</td><td>an</td><td>Akk.</td><td>a-si aminti de</td></tr>\n    <tr><td>sich gewöhnen</td><td>an</td><td>Akk.</td><td>a se obisnui cu</td></tr>\n    <tr><td>arbeiten</td><td>an</td><td>Dat.</td><td>a lucra la</td></tr>\n    <tr><td>teilnehmen</td><td>an</td><td>Dat.</td><td>a participa la</td></tr>\n    <tr><td>warten</td><td>auf</td><td>Akk.</td><td>a astepta</td></tr>\n    <tr><td>sich freuen</td><td>auf</td><td>Akk.</td><td>a abia astepta (viitor)</td></tr>\n    <tr><td>hoffen</td><td>auf</td><td>Akk.</td><td>a spera la</td></tr>\n    <tr><td>achten</td><td>auf</td><td>Akk.</td><td>a fi atent la</td></tr>\n    <tr><td>sich vorbereiten</td><td>auf</td><td>Akk.</td><td>a se pregati pentru</td></tr>\n    <tr><td>verzichten</td><td>auf</td><td>Akk.</td><td>a renunta la</td></tr>\n    <tr><td>bestehen</td><td>aus</td><td>Dat.</td><td>a fi compus din</td></tr>\n    <tr><td>helfen</td><td>bei</td><td>Dat.</td><td>a ajuta la</td></tr>\n    <tr><td>sich bedanken</td><td>bei</td><td>Dat.</td><td>a multumi (persoanei)</td></tr>\n    <tr><td>sich entschuldigen</td><td>bei</td><td>Dat.</td><td>a-si cere scuze fata de</td></tr>\n    <tr><td>danken</td><td>für</td><td>Akk.</td><td>a multumi pentru</td></tr>\n    <tr><td>sich interessieren</td><td>für</td><td>Akk.</td><td>a fi interesat de</td></tr>\n    <tr><td>sorgen</td><td>für</td><td>Akk.</td><td>a se ingriji de</td></tr>\n    <tr><td>sich entscheiden</td><td>für/gegen</td><td>Akk.</td><td>a se decide pt./impotriva</td></tr>\n    <tr><td>anfangen / aufhören</td><td>mit</td><td>Dat.</td><td>a incepe / termina cu</td></tr>\n    <tr><td>sprechen</td><td>mit / über</td><td>Dat./Akk.</td><td>a vorbi cu / despre</td></tr>\n    <tr><td>sich treffen</td><td>mit</td><td>Dat.</td><td>a se intalni cu</td></tr>\n    <tr><td>fragen</td><td>nach</td><td>Dat.</td><td>a intreba de</td></tr>\n    <tr><td>sich ärgern</td><td>über</td><td>Akk.</td><td>a se enerva din cauza</td></tr>\n    <tr><td>sich freuen</td><td>über</td><td>Akk.</td><td>a se bucura de (trecut)</td></tr>\n    <tr><td>bitten</td><td>um</td><td>Akk.</td><td>a ruga/cere</td></tr>\n    <tr><td>sich kümmern</td><td>um</td><td>Akk.</td><td>a se ocupa de</td></tr>\n    <tr><td>träumen</td><td>von</td><td>Dat.</td><td>a visa la</td></tr>\n    <tr><td>abhängen</td><td>von</td><td>Dat.</td><td>a depinde de</td></tr>\n    <tr><td>gratulieren</td><td>zu</td><td>Dat.</td><td>a felicita pentru</td></tr>\n  </tbody>\n</table>\n\n<h3>Strategii de invatare</h3>\n<ol>\n  <li><strong>Inveti pe perechi:</strong> nu memora \"denken\" si separat \"an\". Memoreaza \"denken AN\" ca o unitate.</li>\n  <li><strong>Concentreaza-te pe pereche-trucuri</strong> (cele 8 de mai sus) - acestea apar des in examene si conversatie.</li>\n  <li><strong>Foloseste in propozitii proprii:</strong> dupa ce inveti un verb, scrie 2-3 propozitii personale cu el.</li>\n  <li><strong>Repetare zilnica scurta:</strong> 5-10 verbe pe zi, repetate dupa 1, 3, 7 zile.</li>\n</ol>\n","exercises":[{"id":"vp-1","type":"Lückentext","difficulty":"Usor","question":"Ich warte ___ den Bus.","options":null,"correctAnswer":"auf","explanationRomanian":"Verbul 'warten' merge cu prepozitia 'auf' + Akkusativ. Astepti orientat SPRE ceva care urmeaza. Capcana frecventa: in romana zicem 'astept autobuzul', dar in germana e 'astept AUF autobuzul'."},{"id":"vp-2","type":"Lückentext","difficulty":"Usor","question":"Ich danke dir ___ das schöne Geschenk.","options":null,"correctAnswer":"für","explanationRomanian":"'danken FÜR' + Akkusativ = a multumi PENTRU ceva. La fel ca in romana ('multumesc pentru') si engleza ('thank you for')."},{"id":"vp-3","type":"Lückentext","difficulty":"Usor","question":"Ich denke oft ___ meine Familie.","options":null,"correctAnswer":"an","explanationRomanian":"'denken AN' + Akkusativ = a se gandi la. In germana NU se foloseste 'auf' aici. Truc: gandul tau este orientat 'AN' (catre) cineva."},{"id":"vp-4","type":"Lückentext","difficulty":"Mediu","question":"Sie freut sich ___ den Urlaub im August. (eveniment viitor)","options":null,"correctAnswer":"auf","explanationRomanian":"Cand bucuria e pentru ceva DIN VIITOR (vacanta care urmeaza) -> 'sich freuen AUF' + Akkusativ. Acesta e una din cele mai importante perechi A2!"},{"id":"vp-5","type":"Lückentext","difficulty":"Mediu","question":"Ich freue mich ___ das schöne Geschenk, das ich gestern bekommen habe.","options":null,"correctAnswer":"über","explanationRomanian":"Cand bucuria e pentru ceva CARE DEJA S-A INTAMPLAT (cadoul primit ieri) -> 'sich freuen ÜBER' + Akkusativ. Cuvantul 'gestern' iti spune ca e in trecut."},{"id":"vp-6","type":"Lückentext","difficulty":"Mediu","question":"Das Team besteht ___ zehn Spielern.","options":null,"correctAnswer":"aus","explanationRomanian":"'bestehen AUS' + Dativ = a fi compus DIN. Atentie: NU confunda cu 'bestehen AUF' + Dativ care inseamna 'a insista PE ceva'."},{"id":"vp-7","type":"Lückentext","difficulty":"Greu","question":"Ich beschwere mich ___ den schlechten Service. (despre ce ma plang)","options":null,"correctAnswer":"über","explanationRomanian":"'sich beschweren ÜBER' + Akk. = a se plange DE (subiectul plangerii). NOTA: 'sich beschweren BEI' + Dativ = a te plange LA cineva (persoana). Doua prepozitii diferite, doua roluri diferite."},{"id":"vp-8","type":"Lückentext","difficulty":"Greu","question":"Es geht ___ ein wichtiges Problem in unserer Firma.","options":null,"correctAnswer":"um","explanationRomanian":"'es geht UM' + Akk. = este vorba DESPRE. Expresie idiomatica fixa, foarte frecventa in conversatie. Truc: 'um' = in jurul, deci subiectul 'se invarte in jurul' acelei probleme."},{"id":"vp-9","type":"Satzbau","difficulty":"Usor","question":"Ordoneaza cuvintele intr-o propozitie corecta:","options":["Hilfe","dich","um","bitte","Ich"],"correctAnswer":"Ich bitte dich um Hilfe","explanationRomanian":"Topica: Subiect (Ich) + Verb conjugat pe pozitia 2 (bitte) + obiect direct (dich) + prepozitie (um) + obiect (Hilfe). 'bitten UM' = a cere/ruga pentru ceva."},{"id":"vp-10","type":"Satzbau","difficulty":"Usor","question":"Ordoneaza cuvintele:","options":["Bus","Ich","den","warte","auf"],"correctAnswer":"Ich warte auf den Bus","explanationRomanian":"Verbul mereu pe pozitia 2: Ich (S) + warte (V) + auf (prep.) + den Bus (Akk., m.). 'warten auf' + Akkusativ."},{"id":"vp-11","type":"Satzbau","difficulty":"Mediu","question":"Ordoneaza cuvintele:","options":["einem","Er","arbeitet","Projekt","an","neuen"],"correctAnswer":"Er arbeitet an einem neuen Projekt","explanationRomanian":"'arbeiten AN' + Dativ. Topica: Er (S) + arbeitet (V poz.2) + an (prep.) + einem neuen Projekt (Dat. neutru cu adjectiv 'neu' declinat -en)."},{"id":"vp-12","type":"Satzbau","difficulty":"Mediu","question":"Ordoneaza cuvintele:","options":["zum","dir","Geburtstag","Ich","gratuliere"],"correctAnswer":"Ich gratuliere dir zum Geburtstag","explanationRomanian":"'gratulieren ZU' + Dativ. 'zum' = zu+dem (contractie). Topica: S + V + obiect Dat. (dir) + prepozitie + obiect Dat. (zum Geburtstag)."},{"id":"vp-13","type":"Satzbau","difficulty":"Mediu","question":"Ordoneaza cuvintele:","options":["mich","dir","bei","Ich","für","bedanke","Hilfe","die"],"correctAnswer":"Ich bedanke mich bei dir für die Hilfe","explanationRomanian":"Doua perechi cu 'bedanken': BEI dir (la cine = persoana, Dativ) + FÜR die Hilfe (pentru ce = Akk.). Reflexiv 'mich' vine imediat dupa verbul conjugat."},{"id":"vp-14","type":"Satzbau","difficulty":"Greu","question":"Ordoneaza cuvintele (atentie la Perfekt):","options":["gewartet","lange","Wir","Spiel","haben","auf","das"],"correctAnswer":"Wir haben lange auf das Spiel gewartet","explanationRomanian":"Perfekt: haben + ... + Partizip (gewartet) la sfarsit. 'warten auf' + Akkusativ (das Spiel). Adverbul 'lange' (mult timp) intre auxiliar si complement."},{"id":"vp-15","type":"Satzbau","difficulty":"Greu","question":"Ordoneaza (Perfekt + verb reflexiv):","options":["sich","verliebt","Bruder","in","Mein","hat","sie"],"correctAnswer":"Mein Bruder hat sich in sie verliebt","explanationRomanian":"'sich verlieben IN' + Akkusativ. La Perfekt: hat + sich (reflexiv) + in sie (Akk.) + verliebt (Partizip la sfarsit). Pronumele 'sie' (in ea) e Akkusativ feminin singular."},{"id":"vp-16","type":"Satzbau","difficulty":"Greu","question":"Ordoneaza (subordonata cu weil):","options":["weil","Ich","ich","müde","schlafen","gehe","bin"],"correctAnswer":"Ich gehe schlafen weil ich müde bin","explanationRomanian":"Propozitie principala (Ich gehe schlafen) + subordonata cu 'weil' unde verbul 'bin' merge la sfarsit. 'müde sein' nu are prepozitie (e adjectiv predicativ)."},{"id":"vp-17","type":"Fehlerkorrektur","difficulty":"Usor","question":"Greseala in propozitie. Scrie versiunea corecta:\n\"Ich warte für den Bus.\"","options":null,"correctAnswer":"Ich warte auf den Bus","explanationRomanian":"Greseala: 'für' in loc de 'auf'. Verbul 'warten' merge cu 'auf', NU 'für'. 'warten auf' + Akkusativ. Capcana clasica pentru romani."},{"id":"vp-18","type":"Fehlerkorrektur","difficulty":"Usor","question":"Greseala. Scrie corect:\n\"Ich denke auf dich.\"","options":null,"correctAnswer":"Ich denke an dich","explanationRomanian":"Greseala: 'auf' in loc de 'an'. 'denken AN' + Akkusativ. Truc: gandul e orientat 'AN' (catre), nu 'AUF' (deasupra)."},{"id":"vp-19","type":"Fehlerkorrektur","difficulty":"Mediu","question":"Greseala. Scrie corect:\n\"Wir sprechen mit das Wetter.\"","options":null,"correctAnswer":"Wir sprechen über das Wetter","explanationRomanian":"Greseala: 'mit' in loc de 'über'. Vremea e SUBIECT, nu interlocutor. 'sprechen MIT' = vorbesti CU CINEVA (persoana). 'sprechen ÜBER' = vorbesti DESPRE CEVA (subiect)."},{"id":"vp-20","type":"Fehlerkorrektur","difficulty":"Mediu","question":"Greseala. Scrie corect:\n\"Ich freue mich auf das Geschenk, das ich gestern bekommen habe.\"","options":null,"correctAnswer":"Ich freue mich über das Geschenk, das ich gestern bekommen habe","explanationRomanian":"Greseala: 'auf' in loc de 'über'. Cuvantul 'gestern' arata ca e TRECUT -> 'sich freuen ÜBER' (nu 'auf' care e pentru viitor)."},{"id":"vp-21","type":"Fehlerkorrektur","difficulty":"Mediu","question":"Greseala. Scrie corect:\n\"Ich erinnere mich an meiner Schule.\"","options":null,"correctAnswer":"Ich erinnere mich an meine Schule","explanationRomanian":"Greseala in caz: 'meiner' (Dativ) in loc de 'meine' (Akkusativ). 'sich erinnern AN' cere ACUZATIV, nu Dativ. Femininul ramane neschimbat la Akk: meine Schule."},{"id":"vp-22","type":"Fehlerkorrektur","difficulty":"Greu","question":"Greseala. Scrie corect:\n\"Sie hat mich gegen die Idee entschieden.\"","options":null,"correctAnswer":"Sie hat sich gegen die Idee entschieden","explanationRomanian":"Greseala in pronume reflexiv: 'mich' (eu) in loc de 'sich' (ea). 'sich entscheiden' e reflexiv: pers. 3 -> 'sich'. La Perfekt: sie hat sich + ... + entschieden (Partizip la sfarsit)."},{"id":"vp-23","type":"Fehlerkorrektur","difficulty":"Greu","question":"Greseala. Scrie corect:\n\"Es handelt sich für ein wichtiges Problem.\"","options":null,"correctAnswer":"Es handelt sich um ein wichtiges Problem","explanationRomanian":"Greseala: 'für' in loc de 'um'. 'es handelt sich UM' = este vorba DESPRE. Expresie fixa, capcana frecventa pentru ca in romana zicem 'pentru'/'despre'."},{"id":"vp-24","type":"Fehlerkorrektur","difficulty":"Greu","question":"Greseala. Scrie corect:\n\"Sie kämpft auf ihre Rechte.\"","options":null,"correctAnswer":"Sie kämpft für ihre Rechte","explanationRomanian":"Greseala: 'auf' in loc de 'für'. 'kämpfen FÜR' + Akk. = a lupta PENTRU o cauza/idee. Atentie la trio: kämpfen FÜR (cauza) / UM (a obtine) / GEGEN (impotriva)."},{"id":"vp-25","type":"Umformung","difficulty":"Usor","question":"Inlocuieste numele cu pronume:\n\"Ich denke an Maria.\"","options":null,"correctAnswer":"Ich denke an sie","explanationRomanian":"Maria (femeie singular) -> 'sie' (ea). Prepozitia 'an' ramane. Pentru OAMENI se foloseste pronumele normal dupa prepozitie (an sie/ihn/uns/euch)."},{"id":"vp-26","type":"Umformung","difficulty":"Mediu","question":"Inlocuieste obiectul cu da-cuvant (pentru lucruri):\n\"Ich erinnere mich an die Schule.\"","options":null,"correctAnswer":"Ich erinnere mich daran","explanationRomanian":"Pentru LUCRURI (nu persoane), 'an + lucru' devine 'daran' (da+r+an, cu 'r' de legatura caci 'an' incepe cu vocala). Pattern: da+(r)+prepozitie."},{"id":"vp-27","type":"Umformung","difficulty":"Mediu","question":"Adauga negatie 'nicht':\n\"Ich rechne mit Problemen.\"","options":null,"correctAnswer":"Ich rechne nicht mit Problemen","explanationRomanian":"Pentru a nega o constructie cu prepozitie, 'nicht' se pune INAINTE de prepozitie (nu inainte de obiect). 'rechnen MIT' + Dat. = a se astepta la."},{"id":"vp-28","type":"Umformung","difficulty":"Mediu","question":"Pune la trecut (Perfekt):\n\"Ich freue mich über das Geschenk.\"","options":null,"correctAnswer":"Ich habe mich über das Geschenk gefreut","explanationRomanian":"Verbele reflexive iau auxiliar 'haben'. Schema Perfekt: ich habe + reflexiv (mich) + ... + Partizip (gefreut) la sfarsit. 'sich freuen' e regulat -> gefreut."},{"id":"vp-29","type":"Umformung","difficulty":"Mediu","question":"Conjuga la pers. 3 sg.:\n\"sich freuen auf / das Wochenende / sie (ea)\"","options":null,"correctAnswer":"Sie freut sich auf das Wochenende","explanationRomanian":"'sich freuen auf' + Akk. La pers. 3 sg.: sie freut sich auf + Akk. 'das Wochenende' (n.) ramane neschimbat la Akk."},{"id":"vp-30","type":"Umformung","difficulty":"Greu","question":"Formuleaza intrebarea (cu 'wo+prep'):\n\"Ich warte auf den Bus.\"","options":null,"correctAnswer":"Worauf wartest du","explanationRomanian":"Pentru intrebari despre LUCRURI cu prepozitie, folosesti 'wo + prepozitie'. wo+auf = worauf (cu 'r' de legatura). Pattern: wo+(r)+prep + verb + subiect."},{"id":"vp-31","type":"Umformung","difficulty":"Greu","question":"Pune la trecut (Perfekt) - atentie verb neregulat:\n\"Wir sprechen mit dem Lehrer.\"","options":null,"correctAnswer":"Wir haben mit dem Lehrer gesprochen","explanationRomanian":"'sprechen' e neregulat -> Partizip 'gesprochen'. Auxiliar 'haben'. Topica: Wir haben + complement (mit dem Lehrer) + Partizip (gesprochen) la sfarsit."},{"id":"vp-32","type":"Umformung","difficulty":"Greu","question":"Inlocuieste numele cu da-cuvant:\n\"Ich denke oft an die Sommerferien.\"","options":null,"correctAnswer":"Ich denke oft daran","explanationRomanian":"'die Sommerferien' = lucru/eveniment, NU persoana -> da-cuvant 'daran' (da+r+an). Daca era persoana ('an Maria') am fi pus 'an sie'."},{"id":"vp-33","type":"Multiple Choice","difficulty":"Usor","question":"Ich freue mich ___ die Sommerferien (vacanta de vara, in viitor).","options":["auf","über","für","an"],"correctAnswer":"auf","explanationRomanian":"Pentru evenimente VIITOARE -> 'sich freuen AUF'. Capcana: 'für' (in romana zicem 'pentru') NU merge in germana - regula e clara: auf=viitor, über=trecut. 'an' si 'über' nu se folosesc pentru 'sich freuen' la viitor."},{"id":"vp-34","type":"Multiple Choice","difficulty":"Usor","question":"Wir sprechen ___ unserer Mutter. (CU mama)","options":["über","mit","von","an"],"correctAnswer":"mit","explanationRomanian":"Cand vorbim CU O PERSOANA (interlocutorul) folosim 'sprechen MIT' + Dat. Capcane: 'über' = despre subiect; 'von' = mai indirect (a mentiona); 'an' nu se foloseste niciodata cu 'sprechen'."},{"id":"vp-35","type":"Multiple Choice","difficulty":"Mediu","question":"Sie kümmert sich ___ ihre kleinen Kinder.","options":["um","für","mit","an"],"correctAnswer":"um","explanationRomanian":"'sich kümmern UM' + Akk. = a se ocupa de cineva (cu grija activa). Capcana: 'für' suna apropiat (in romana 'pentru copii') si exista 'sorgen für', dar verbul 'kümmern' cere strict 'um'."},{"id":"vp-36","type":"Multiple Choice","difficulty":"Mediu","question":"Worauf wartest du? Ich warte ___","options":["über das Wetter","auf den Bus","mit dem Wetter","an die Wahl"],"correctAnswer":"auf den Bus","explanationRomanian":"Intrebarea 'worauf' contine deja prepozitia 'auf', deci raspunsul incepe cu 'auf' + Akk. 'auf den Bus' (m. Akk: der Bus -> den Bus). Celelalte folosesc prepozitii gresite."},{"id":"vp-37","type":"Multiple Choice","difficulty":"Mediu","question":"Ich interessiere mich ___ Sport. (sport in general, ca domeniu)","options":["für","an","auf","über"],"correctAnswer":"für","explanationRomanian":"Pentru un domeniu GENERAL (sport, muzica) -> 'sich interessieren FÜR' + Akk. 'AN' se foloseste rar, doar pentru un lucru SPECIFIC ('an diesem Auto'). La A2, FÜR e mereu raspunsul corect."},{"id":"vp-38","type":"Multiple Choice","difficulty":"Greu","question":"___ wem hast du das gehört? (de la cine ai auzit asta?)","options":["Von","Mit","Um","An"],"correctAnswer":"Von","explanationRomanian":"'hören VON' + Dativ = a auzi DE LA cineva (sursa informatiei). 'wem' = forma Dativ a lui 'wer'. Combinatia: Von wem? = de la cine? (Dat.). 'mit' inseamna 'cu', 'um' = despre/in jur, 'an' nu merge cu 'hören'."},{"id":"vp-39","type":"Multiple Choice","difficulty":"Greu","question":"Welche Form ist richtig? Er ___ für seine Verspätung.","options":["entschuldigt mich","entschuldigt","entschuldigt sich","sich entschuldigt"],"correctAnswer":"entschuldigt sich","explanationRomanian":"'sich entschuldigen' este reflexiv. Pers. 3 sg: er entschuldigt sich (reflexivul 'sich'). Verbul conjugat sta pe pozitia 2, pronumele reflexiv imediat dupa verbul conjugat. 'mich' ar fi gresit pentru 'er' (mich = eu)."},{"id":"vp-40","type":"Multiple Choice","difficulty":"Greu","question":"Was bedeutet 'Es hängt von dir ab'?","options":["Atarna pe tine","Depinde de tine","Vine de la tine","Iese din tine"],"correctAnswer":"Depinde de tine","explanationRomanian":"'abhängen VON' + Dat. = a depinde de. Verb separabil: 'ab' merge la sfarsit la prezent. Sensul vine din imaginea unui tablou care 'atarna DE' un cui - daca dispare cuiul, cade tabloul."},{"id":"vp-41","type":"Lückentext","difficulty":"Usor","question":"Ich warte ___ den Bus.","options":null,"correctAnswer":"auf","explanationRomanian":"'warten auf' = a astepta. Combinatie fixa, prepozitia 'auf' nu se schimba (auf + Akk)."},{"id":"vp-42","type":"Lückentext","difficulty":"Mediu","question":"Ich freue mich ___ den Urlaub.","options":null,"correctAnswer":"auf","explanationRomanian":"'sich freuen auf' = a abia astepta (viitor). Combinatie fixa, prepozitia 'auf' nu se schimba (auf + Akk)."},{"id":"vp-43","type":"Lückentext","difficulty":"Mediu","question":"Ich hoffe ___ gutes Wetter.","options":null,"correctAnswer":"auf","explanationRomanian":"'hoffen auf' = a spera la. Combinatie fixa, prepozitia 'auf' nu se schimba (auf + Akk)."},{"id":"vp-44","type":"Lückentext","difficulty":"Usor","question":"Ich achte ___ die Autos.","options":null,"correctAnswer":"auf","explanationRomanian":"'achten auf' = a fi atent la. Combinatie fixa, prepozitia 'auf' nu se schimba (auf + Akk)."},{"id":"vp-45","type":"Lückentext","difficulty":"Mediu","question":"Ich passe ___ den Hund auf.","options":null,"correctAnswer":"auf","explanationRomanian":"'aufpassen auf' = a supraveghea. Combinatie fixa, prepozitia 'auf' nu se schimba (auf + Akk)."},{"id":"vp-46","type":"Lückentext","difficulty":"Usor","question":"Ich antworte ___ die Frage.","options":null,"correctAnswer":"auf","explanationRomanian":"'antworten auf' = a raspunde la. Combinatie fixa, prepozitia 'auf' nu se schimba (auf + Akk)."},{"id":"vp-47","type":"Lückentext","difficulty":"Mediu","question":"Ich bereite mich ___ die Pruefung vor.","options":null,"correctAnswer":"auf","explanationRomanian":"'sich vorbereiten auf' = a se pregati pentru. Combinatie fixa, prepozitia 'auf' nu se schimba (auf + Akk)."},{"id":"vp-48","type":"Lückentext","difficulty":"Mediu","question":"Ich verlasse mich ___ meinen Freund.","options":null,"correctAnswer":"auf","explanationRomanian":"'sich verlassen auf' = a se baza pe. Combinatie fixa, prepozitia 'auf' nu se schimba (auf + Akk)."},{"id":"vp-49","type":"Lückentext","difficulty":"Mediu","question":"Ich reagiere ___ die Nachricht.","options":null,"correctAnswer":"auf","explanationRomanian":"'reagieren auf' = a reactiona la. Combinatie fixa, prepozitia 'auf' nu se schimba (auf + Akk)."},{"id":"vp-50","type":"Lückentext","difficulty":"Mediu","question":"Ich verzichte ___ den Zucker.","options":null,"correctAnswer":"auf","explanationRomanian":"'verzichten auf' = a renunta la. Combinatie fixa, prepozitia 'auf' nu se schimba (auf + Akk)."},{"id":"vp-51","type":"Lückentext","difficulty":"Mediu","question":"Ich bestehe ___ drei Teilen.","options":null,"correctAnswer":"aus","explanationRomanian":"'bestehen aus' = a fi compus din. Combinatie fixa, prepozitia 'aus' nu se schimba (aus + Dat)."},{"id":"vp-52","type":"Lückentext","difficulty":"Mediu","question":"Ich stamme ___ Rumaenien.","options":null,"correctAnswer":"aus","explanationRomanian":"'stammen aus' = a proveni din. Combinatie fixa, prepozitia 'aus' nu se schimba (aus + Dat)."},{"id":"vp-53","type":"Lückentext","difficulty":"Mediu","question":"Ich helfe ___ den Hausaufgaben.","options":null,"correctAnswer":"bei","explanationRomanian":"'helfen bei' = a ajuta la. Combinatie fixa, prepozitia 'bei' nu se schimba (bei + Dat)."},{"id":"vp-54","type":"Lückentext","difficulty":"Mediu","question":"Ich bedanke mich ___ dem Lehrer.","options":null,"correctAnswer":"bei","explanationRomanian":"'sich bedanken bei' = a multumi cuiva (persoanei). Combinatie fixa, prepozitia 'bei' nu se schimba (bei + Dat)."},{"id":"vp-55","type":"Lückentext","difficulty":"Mediu","question":"Ich beschwere mich ___ dem Chef.","options":null,"correctAnswer":"bei","explanationRomanian":"'sich beschweren bei' = a se plange la (cineva). Combinatie fixa, prepozitia 'bei' nu se schimba (bei + Dat)."},{"id":"vp-56","type":"Lückentext","difficulty":"Mediu","question":"Ich entschuldige mich ___ der Mutter.","options":null,"correctAnswer":"bei","explanationRomanian":"'sich entschuldigen bei' = a-si cere scuze fata de. Combinatie fixa, prepozitia 'bei' nu se schimba (bei + Dat)."},{"id":"vp-57","type":"Multiple Choice","difficulty":"Mediu","question":"Ich freue mich ___ den Urlaub naechste Woche.","options":["auf","über","für","an"],"correctAnswer":"auf","explanationRomanian":"Eveniment VIITOR (vacanta urmatoare) -> 'sich freuen AUF'. 'über' e pentru trecut."},{"id":"vp-58","type":"Multiple Choice","difficulty":"Mediu","question":"Ich freue mich ___ deinen Brief von gestern.","options":["auf","über","für","an"],"correctAnswer":"über","explanationRomanian":"Eveniment TRECUT (scrisoare deja primita) -> 'sich freuen ÜBER'."},{"id":"vp-59","type":"Multiple Choice","difficulty":"Usor","question":"Wir sprechen ___ unserem Lehrer.","options":["mit","über","von","an"],"correctAnswer":"mit","explanationRomanian":"'sprechen MIT' = vorbim CU O PERSOANA (interlocutor) + Dativ."},{"id":"vp-60","type":"Multiple Choice","difficulty":"Usor","question":"Wir sprechen ___ die Pruefung.","options":["mit","über","von","an"],"correctAnswer":"über","explanationRomanian":"'sprechen ÜBER' = vorbim DESPRE UN SUBIECT + Akkusativ."},{"id":"vp-61","type":"Multiple Choice","difficulty":"Mediu","question":"Oma erzaehlt ___ ihrer Jugend. (amintiri personale)","options":["von","über","mit","an"],"correctAnswer":"von","explanationRomanian":"'erzaehlen VON' + Dat. = ceva personal, amintiri trăite. 'über' e pentru subiect general."},{"id":"vp-62","type":"Multiple Choice","difficulty":"Mediu","question":"Der Reporter berichtet ___ den Krieg. (subiect general)","options":["über","von","mit","an"],"correctAnswer":"über","explanationRomanian":"'berichten ÜBER' + Akk. = a raporta despre un subiect (analitic, general)."},{"id":"vp-63","type":"Multiple Choice","difficulty":"Usor","question":"Ich danke dir ___ deine Hilfe.","options":["für","bei","mit","an"],"correctAnswer":"für","explanationRomanian":"'danken FÜR' + Akk. = multumesti PENTRU lucrul primit."},{"id":"vp-64","type":"Multiple Choice","difficulty":"Mediu","question":"Ich bedanke mich ___ dir.","options":["für","bei","mit","an"],"correctAnswer":"bei","explanationRomanian":"'bedanken BEI' + Dat. = multumesti FATA DE persoana."},{"id":"vp-65","type":"Multiple Choice","difficulty":"Mediu","question":"Er kaempft ___ die Ungerechtigkeit (impotriva).","options":["für","gegen","um","mit"],"correctAnswer":"gegen","explanationRomanian":"'kaempfen GEGEN' + Akk. = a lupta impotriva."},{"id":"vp-66","type":"Multiple Choice","difficulty":"Mediu","question":"Sie kaempft ___ den ersten Platz (a obtine).","options":["für","gegen","um","mit"],"correctAnswer":"um","explanationRomanian":"'kaempfen UM' + Akk. = a lupta pentru a obtine ceva concret."},{"id":"vp-67","type":"Multiple Choice","difficulty":"Mediu","question":"Er kaempft ___ die Freiheit (cauza).","options":["für","gegen","um","mit"],"correctAnswer":"für","explanationRomanian":"'kaempfen FÜR' + Akk. = a lupta pentru o cauza/idee."},{"id":"vp-68","type":"Multiple Choice","difficulty":"Mediu","question":"Das Team besteht ___ zehn Spielern.","options":["aus","auf","mit","von"],"correctAnswer":"aus","explanationRomanian":"'bestehen AUS' + Dat. = compus DIN. Diferit de 'bestehen AUF' (a insista)."},{"id":"vp-69","type":"Multiple Choice","difficulty":"Greu","question":"Er besteht ___ seinem Recht.","options":["aus","auf","mit","von"],"correctAnswer":"auf","explanationRomanian":"'bestehen AUF' + Dat. = a insista pe ceva. Diferit de 'bestehen AUS' (compus din)."},{"id":"vp-70","type":"Multiple Choice","difficulty":"Mediu","question":"Ich sorge ___ meine Familie (am grija).","options":["für","um","mit","an"],"correctAnswer":"für","explanationRomanian":"'sorgen FÜR' + Akk. = a se ingriji activ. Diferit de 'sich sorgen UM' (a fi ingrijorat)."},{"id":"vp-71","type":"Multiple Choice","difficulty":"Greu","question":"Ich sorge mich ___ dich (sunt ingrijorat).","options":["für","um","mit","an"],"correctAnswer":"um","explanationRomanian":"'sich sorgen UM' + Akk. = a fi ingrijorat. Diferit de 'sorgen FÜR' (a se ingriji)."},{"id":"vp-72","type":"Multiple Choice","difficulty":"Mediu","question":"Sie interessiert sich ___ Sport (general).","options":["für","an","auf","über"],"correctAnswer":"für","explanationRomanian":"'sich interessieren FÜR' + Akk. = interes general (sport, muzica). 'AN' = interes specific."},{"id":"vp-73","type":"Multiple Choice","difficulty":"Mediu","question":"Wovon traeumst du? - Ich traeume ___ einem Haus.","options":["von","an","über","mit"],"correctAnswer":"von","explanationRomanian":"'traeumen VON' + Dat. Intrebarea 'wovon' contine deja 'von'."},{"id":"vp-74","type":"Multiple Choice","difficulty":"Mediu","question":"Es geht ___ ein wichtiges Problem.","options":["um","auf","über","an"],"correctAnswer":"um","explanationRomanian":"'es geht UM' = este vorba DESPRE. Expresie idiomatica fixa."},{"id":"vp-75","type":"Multiple Choice","difficulty":"Mediu","question":"Ich rechne ___ Problemen.","options":["mit","auf","an","für"],"correctAnswer":"mit","explanationRomanian":"'rechnen MIT' + Dat. = a se astepta la (literalmente 'a calcula cu')."},{"id":"vp-76","type":"Multiple Choice","difficulty":"Mediu","question":"Es haengt ___ dir ab.","options":["von","auf","an","über"],"correctAnswer":"von","explanationRomanian":"'abhaengen VON' + Dat. = a depinde de. Verb separabil ('haengt ... ab')."},{"id":"vp-77","type":"Satzbau","difficulty":"Usor","question":"Ordoneaza cuvintele intr-o propozitie corecta:","options":["Bus","den","warte","Ich","auf"],"correctAnswer":"Ich warte auf den Bus","explanationRomanian":"S + V poz.2 + prep + Akk. 'warten auf' + Akk."},{"id":"vp-78","type":"Satzbau","difficulty":"Usor","question":"Ordoneaza cuvintele intr-o propozitie corecta:","options":["Geschenk","danke","das","Ich","fuer","dir"],"correctAnswer":"Ich danke dir fuer das Geschenk","explanationRomanian":"S + V + Dat. (dir) + fuer + Akk. (das Geschenk)."},{"id":"vp-79","type":"Satzbau","difficulty":"Usor","question":"Ordoneaza cuvintele intr-o propozitie corecta:","options":["mich","Mutter","freue","auf","ich","meine"],"correctAnswer":"Ich freue mich auf meine Mutter","explanationRomanian":"Reflexiv 'mich' dupa verbul conjugat. 'freuen auf' + Akk."},{"id":"vp-80","type":"Satzbau","difficulty":"Usor","question":"Ordoneaza cuvintele intr-o propozitie corecta:","options":["Geschichte","die","lacht","ueber","Er"],"correctAnswer":"Er lacht ueber die Geschichte","explanationRomanian":"'lachen ÜBER' + Akk. S + V + prep + Akk."},{"id":"vp-81","type":"Satzbau","difficulty":"Mediu","question":"Ordoneaza cuvintele intr-o propozitie corecta:","options":["mit","Bruder","spreche","Ich","meinem"],"correctAnswer":"Ich spreche mit meinem Bruder","explanationRomanian":"'sprechen MIT' + Dat. (mit meinem Bruder)."},{"id":"vp-82","type":"Satzbau","difficulty":"Mediu","question":"Ordoneaza cuvintele intr-o propozitie corecta:","options":["Hilfe","bittet","Sie","um","uns"],"correctAnswer":"Sie bittet uns um Hilfe","explanationRomanian":"'bitten UM' + Akk. (Hilfe). Plus obiect direct (uns)."},{"id":"vp-83","type":"Satzbau","difficulty":"Mediu","question":"Ordoneaza cuvintele intr-o propozitie corecta:","options":["aus","besteht","drei","Teilen","Buch","das"],"correctAnswer":"Das Buch besteht aus drei Teilen","explanationRomanian":"'bestehen AUS' + Dat. plural (Teilen)."},{"id":"vp-84","type":"Satzbau","difficulty":"Greu","question":"Ordoneaza cuvintele intr-o propozitie corecta:","options":["Pruefung","die","auf","vor","bereiten","Wir","uns"],"correctAnswer":"Wir bereiten uns auf die Pruefung vor","explanationRomanian":"Verb separabil 'sich vorbereiten auf'. Reflexiv 'uns' + 'auf die Pruefung' (Akk.) + 'vor' la sfarsit."},{"id":"vp-85","type":"Satzbau","difficulty":"Greu","question":"Ordoneaza cuvintele intr-o propozitie corecta:","options":["Geschenk","haben","uns","wir","ueber","gefreut","das"],"correctAnswer":"Wir haben uns ueber das Geschenk gefreut","explanationRomanian":"Perfekt: haben + reflexiv + ÜBER + Akk + Partizip la sfarsit."},{"id":"vp-86","type":"Satzbau","difficulty":"Greu","question":"Ordoneaza cuvintele intr-o propozitie corecta:","options":["sich","verliebt","Bruder","in","hat","sie","Mein"],"correctAnswer":"Mein Bruder hat sich in sie verliebt","explanationRomanian":"Perfekt: hat + sich + IN + Akk (sie) + Partizip 'verliebt' la sfarsit."},{"id":"vp-87","type":"Fehlerkorrektur","difficulty":"Mediu","question":"Greseala in propozitie. Scrie versiunea corecta:\n\"Ich denke an dir.\"","options":null,"correctAnswer":"Ich denke an dich","explanationRomanian":"'denken AN' cere ACUZATIV, nu Dativ. 'dir' (Dat.) -> 'dich' (Akk.)."},{"id":"vp-88","type":"Fehlerkorrektur","difficulty":"Usor","question":"Greseala in propozitie. Scrie versiunea corecta:\n\"Ich warte fuer den Zug.\"","options":null,"correctAnswer":"Ich warte auf den Zug","explanationRomanian":"'warten AUF' (nu 'fuer'). Capcana din traducere RO 'astept pentru'."},{"id":"vp-89","type":"Fehlerkorrektur","difficulty":"Mediu","question":"Greseala in propozitie. Scrie versiunea corecta:\n\"Ich freue mich auf den Brief, den ich gestern bekommen habe.\"","options":null,"correctAnswer":"Ich freue mich ueber den Brief, den ich gestern bekommen habe","explanationRomanian":"'gestern' = trecut, deci 'sich freuen ÜBER' (nu 'auf' care e pentru viitor)."},{"id":"vp-90","type":"Fehlerkorrektur","difficulty":"Mediu","question":"Greseala in propozitie. Scrie versiunea corecta:\n\"Wir sprechen mit das Wetter.\"","options":null,"correctAnswer":"Wir sprechen ueber das Wetter","explanationRomanian":"Vremea = subiect, nu interlocutor. 'sprechen MIT' = cu cineva; 'sprechen ÜBER' = despre ceva."},{"id":"vp-91","type":"Fehlerkorrektur","difficulty":"Greu","question":"Greseala in propozitie. Scrie versiunea corecta:\n\"Sie bedankt sich fuer dem Lehrer.\"","options":null,"correctAnswer":"Sie bedankt sich beim Lehrer","explanationRomanian":"'bedanken BEI' + Dat. (la persoana). 'fuer' merge cu 'danken' nu 'bedanken'."},{"id":"vp-92","type":"Fehlerkorrektur","difficulty":"Mediu","question":"Greseala in propozitie. Scrie versiunea corecta:\n\"Er kaempft auf seine Rechte.\"","options":null,"correctAnswer":"Er kaempft fuer seine Rechte","explanationRomanian":"'kaempfen FÜR' + Akk. = pentru o cauza. 'auf' nu merge."},{"id":"vp-93","type":"Fehlerkorrektur","difficulty":"Mediu","question":"Greseala in propozitie. Scrie versiunea corecta:\n\"Ich gewoehne mich auf das Wetter.\"","options":null,"correctAnswer":"Ich gewoehne mich an das Wetter","explanationRomanian":"'sich gewoehnen AN' + Akk. (nu 'auf'). Te 'lipesti AN' noul obicei."},{"id":"vp-94","type":"Fehlerkorrektur","difficulty":"Usor","question":"Greseala in propozitie. Scrie versiunea corecta:\n\"Es geht auf Geld.\"","options":null,"correctAnswer":"Es geht um Geld","explanationRomanian":"Expresie fixa: 'es geht UM' = este vorba despre. Niciodata 'auf'."},{"id":"vp-95","type":"Fehlerkorrektur","difficulty":"Mediu","question":"Greseala in propozitie. Scrie versiunea corecta:\n\"Ich erinnere mich an meiner Schule.\"","options":null,"correctAnswer":"Ich erinnere mich an meine Schule","explanationRomanian":"'sich erinnern AN' + ACUZATIV (nu Dativ). 'meiner' (Dat.) -> 'meine' (Akk.)."},{"id":"vp-96","type":"Fehlerkorrektur","difficulty":"Mediu","question":"Greseala in propozitie. Scrie versiunea corecta:\n\"Sie hat sich fuer ihn verliebt.\"","options":null,"correctAnswer":"Sie hat sich in ihn verliebt","explanationRomanian":"'sich verlieben IN' + Akk. (nu 'fuer'). Intri IN starea/persoana."},{"id":"vp-97","type":"Fehlerkorrektur","difficulty":"Greu","question":"Greseala in propozitie. Scrie versiunea corecta:\n\"Das Team besteht aus zehn Spieler.\"","options":null,"correctAnswer":"Das Team besteht aus zehn Spielern","explanationRomanian":"'aus' + Dat. La plural Dat. substantivul ia '-n': Spieler -> Spielern."},{"id":"vp-98","type":"Fehlerkorrektur","difficulty":"Mediu","question":"Greseala in propozitie. Scrie versiunea corecta:\n\"Ich entschuldige mich an dir.\"","options":null,"correctAnswer":"Ich entschuldige mich bei dir","explanationRomanian":"'sich entschuldigen BEI' + Dat. (la persoana). Niciodata 'an'."},{"id":"vp-99","type":"Umformung","difficulty":"Usor","question":"Inlocuieste cu pronume personal:\n\"Ich denke an Maria.\"","options":null,"correctAnswer":"Ich denke an sie","explanationRomanian":"Maria = singular feminin -> 'sie'. Pentru oameni se foloseste pronumele direct dupa prepozitie."},{"id":"vp-100","type":"Umformung","difficulty":"Mediu","question":"Inlocuieste cu da-cuvant (lucru):\n\"Ich erinnere mich an die Reise.\"","options":null,"correctAnswer":"Ich erinnere mich daran","explanationRomanian":"'an + lucru' -> 'daran' (cu r de legatura caci 'an' incepe cu vocala)."},{"id":"vp-101","type":"Umformung","difficulty":"Mediu","question":"Inlocuieste cu da-cuvant:\n\"Wir warten auf den Bus.\"","options":null,"correctAnswer":"Wir warten darauf","explanationRomanian":"'auf + lucru' -> 'darauf'. Pentru lucruri se foloseste 'da+(r)+prepozitie'."},{"id":"vp-102","type":"Umformung","difficulty":"Mediu","question":"Inlocuieste cu da-cuvant:\n\"Sie spricht ueber das Wetter.\"","options":null,"correctAnswer":"Sie spricht darueber","explanationRomanian":"'ueber + lucru' -> 'darueber'. r de legatura."},{"id":"vp-103","type":"Umformung","difficulty":"Mediu","question":"Pune la trecut (Perfekt):\n\"Ich freue mich ueber den Brief.\"","options":null,"correctAnswer":"Ich habe mich ueber den Brief gefreut","explanationRomanian":"Reflexive iau 'haben'. Schema: ich habe + mich + complement + Partizip la sfarsit."},{"id":"vp-104","type":"Umformung","difficulty":"Mediu","question":"Pune la trecut (Perfekt):\n\"Wir sprechen mit dem Lehrer.\"","options":null,"correctAnswer":"Wir haben mit dem Lehrer gesprochen","explanationRomanian":"'sprechen' neregulat -> Partizip 'gesprochen'. haben + complement + Partizip la sfarsit."},{"id":"vp-105","type":"Umformung","difficulty":"Mediu","question":"Pune la trecut (Perfekt):\n\"Sie wartet auf den Bus.\"","options":null,"correctAnswer":"Sie hat auf den Bus gewartet","explanationRomanian":"'warten' regulat -> 'gewartet'. haben + ... + Partizip la sfarsit."},{"id":"vp-106","type":"Umformung","difficulty":"Mediu","question":"Pune la trecut (Perfekt):\n\"Er denkt an seine Familie.\"","options":null,"correctAnswer":"Er hat an seine Familie gedacht","explanationRomanian":"'denken' neregulat -> Partizip 'gedacht'. haben + ... + Partizip la sfarsit."},{"id":"vp-107","type":"Umformung","difficulty":"Greu","question":"Formuleaza intrebarea cu 'wo+prep':\n\"Ich warte auf den Bus.\"","options":null,"correctAnswer":"Worauf wartest du","explanationRomanian":"Pentru lucruri: wo + prep -> wo+r+auf = worauf."},{"id":"vp-108","type":"Umformung","difficulty":"Greu","question":"Formuleaza intrebarea cu 'wo+prep':\n\"Sie traeumt von Italien.\"","options":null,"correctAnswer":"Wovon traeumst du","explanationRomanian":"wo+von = wovon (fara r caci 'von' incepe cu consoana)."},{"id":"vp-109","type":"Umformung","difficulty":"Mediu","question":"Conjuga la pers. 3 sg.:\n\"sich kuemmern um / der Hund / sie (ea)\"","options":null,"correctAnswer":"Sie kuemmert sich um den Hund","explanationRomanian":"Pers. 3 sg.: sie kuemmert sich. 'um den Hund' (m. Akk.: der Hund -> den Hund)."},{"id":"vp-110","type":"Umformung","difficulty":"Usor","question":"Schimba subiectul la pers. 1 plural (wir):\n\"Er traeumt von einem Haus.\"","options":null,"correctAnswer":"Wir traeumen von einem Haus","explanationRomanian":"Wir + traeumen (terminatie -en). 'von einem Haus' (Dat. neutru) ramane neschimbat."}]},{"id":"relativsaetze","level":"B1","category":"Propozitii","title_de":"Relativsätze (der/die/das)","title_ro":"Propozitii relative","summary":"Subordonate care descriu un substantiv. Pronumele relativ se acorda cu genul (din substantiv) si cazul (din rol).","theory":"\n<h3>Ce este o propozitie relativa?</h3>\n<p>O propozitie care descrie sau aduce mai multe informatii despre un substantiv din propozitia principala. In romana = \"care\".</p>\n<p class=\"gram-example\">Der Mann, <strong>der</strong> dort steht, ist mein Bruder.<br>\n(Barbatul care sta acolo este fratele meu.)</p>\n\n<h3>Pronumele relativ</h3>\n<p>In germana, pronumele relativ se acorda dupa 2 reguli:</p>\n<ul>\n  <li><strong>GENUL si numarul</strong> = de la substantivul din propozitia principala</li>\n  <li><strong>CAZUL</strong> = depinde de rolul lui in propozitia secundara</li>\n</ul>\n\n<h3>Tabel complet (echivalent cu der/die/das)</h3>\n<table class=\"gram-table\">\n  <thead><tr><th>Caz</th><th>m.</th><th>f.</th><th>n.</th><th>pl.</th></tr></thead>\n  <tbody>\n    <tr><td>Nominativ</td><td><strong>der</strong></td><td><strong>die</strong></td><td><strong>das</strong></td><td><strong>die</strong></td></tr>\n    <tr><td>Akkusativ</td><td><strong>den</strong></td><td><strong>die</strong></td><td><strong>das</strong></td><td><strong>die</strong></td></tr>\n    <tr><td>Dativ</td><td><strong>dem</strong></td><td><strong>der</strong></td><td><strong>dem</strong></td><td><strong>denen</strong></td></tr>\n    <tr><td>Genitiv</td><td><strong>dessen</strong></td><td><strong>deren</strong></td><td><strong>dessen</strong></td><td><strong>deren</strong></td></tr>\n  </tbody>\n</table>\n<p>Aproape totul e identic cu articolul definit, cu 2 exceptii: <strong>denen</strong> (Dat. pl.) si <strong>dessen/deren</strong> (Genitiv).</p>\n\n<h3>Exemple pe cazuri</h3>\n\n<h4>Nominativ -- pronumele este SUBIECTUL secundarei</h4>\n<p class=\"gram-example\">Der Mann, <strong>der</strong> Klavier spielt, ist mein Bruder.<br>\n(Cine canta? = der Mann, deci pronumele e subiect = Nominativ.)</p>\n\n<h4>Akkusativ -- pronumele este OBIECTUL DIRECT al secundarei</h4>\n<p class=\"gram-example\">Der Mann, <strong>den</strong> ich sehe, ist mein Bruder.<br>\n(Pe cine vad? = den Mann, deci Akkusativ.)</p>\n\n<h4>Dativ -- pronumele este OBIECTUL INDIRECT</h4>\n<p class=\"gram-example\">Der Mann, <strong>dem</strong> ich helfe, ist mein Bruder.<br>\n(Cui ajut? = dem Mann, deci Dativ.)</p>\n\n<h4>Cu prepozitie</h4>\n<p>Prepozitia merge IMPREUNA cu pronumele relativ la inceputul subordonatei:</p>\n<p class=\"gram-example\">Das ist die Frau, <strong>mit der</strong> ich gestern gesprochen habe.<br>\n(Cu cine am vorbit? = mit der Frau. mit + Dativ.)</p>\n\n<h3>Verbul mereu la sfarsit</h3>\n<p>Ca in toate subordonatele, verbul conjugat al subordonatei merge la SFARSIT:</p>\n<p class=\"gram-example\">Das Buch, das ich lese, <strong>ist</strong> super. (Cartea pe care o citesc e super.)<br>\nDas Auto, <strong>das</strong> du gestern <strong>gekauft hast</strong>, ist neu.</p>\n\n<div class=\"gram-tip\">\n<strong>Strategia in 3 pasi pentru a alege pronumele:</strong><br>\n1. Care e <strong>genul si numarul</strong> substantivului in principala? (m./f./n./pl.)<br>\n2. Ce <strong>rol</strong> joaca pronumele in subordonata? (subiect / obiect direct / indirect)<br>\n3. Combina: gen + caz = pronume.\n</div>\n","exercises":[{"type":"fill","prompt":"Der Mann, ___ dort wohnt, ist Lehrer.","answer":"der","hint":"Mann = m. + e SUBIECTUL subordonatei = Nom.","explanation":"der Mann (m.) + subiect in subordonata (cine locuieste? -> der) = der."},{"type":"fill","prompt":"Die Frau, ___ ich kenne, ist Italienerin.","answer":"die","hint":"Frau = f. + obiect direct (cine?) = Akk","explanation":"die Frau (f.) + Akkusativ (pe cine cunosc?) = die."},{"type":"choice","prompt":"Das Kind, ___ ich helfe, ist krank.","options":["das","den","dem","der"],"answer":"dem","explanation":"das Kind (n.) + Dativ (cui ajut? helfen + Dat.) -> dem."},{"type":"choice","prompt":"Die Bücher, ___ auf dem Tisch liegen, sind alt.","options":["der","die","das","dem"],"answer":"die","explanation":"die Bücher (pl.) + subiect (care stau? -> die) = die (Nom. pl.)."},{"type":"fill","prompt":"Das ist der Freund, mit ___ ich gespielt habe.","answer":"dem","hint":"Freund (m.) + mit cere Dativ","explanation":"der Freund (m.) + prepozitia 'mit' (Dat.) -> mit dem."},{"type":"transform","prompt":"Combina cu propozitie relativa: Ich kenne den Mann. Der Mann arbeitet hier.","answer":"Ich kenne den Mann, der hier arbeitet.","hint":"der = m. Nom.","explanation":"der Mann + subiect in subordonata -> der. Verbul 'arbeitet' la sfarsit."}]},{"id":"konjunktiv-2","level":"B1","category":"Verbe","title_de":"Konjunktiv 2 (Conditional)","title_ro":"Conditional / Optativ","summary":"Pentru situatii ireale, dorinte si politete: 'as merge', 'mi-as dori', 'ai putea'.","theory":"\n<h3>Cand folosim Konjunktiv 2?</h3>\n<ol>\n  <li><strong>Dorinte ireale:</strong> \"Wenn ich reich <strong>wäre</strong>, ...\" (Daca as fi bogat...)</li>\n  <li><strong>Politete:</strong> \"<strong>Könnten</strong> Sie mir helfen?\" (Ati putea sa ma ajutati?)</li>\n  <li><strong>Sfaturi:</strong> \"Du <strong>solltest</strong> mehr schlafen.\" (Ar trebui sa dormi mai mult.)</li>\n  <li><strong>Conditii ireale:</strong> \"Wenn ich Zeit <strong>hätte</strong>, würde ich ...\" (Daca as avea timp, as...)</li>\n</ol>\n\n<h3>Cele 2 forme: würde + Infinitiv vs forma proprie</h3>\n<p>In germana moderna sunt 2 cai de a forma Konjunktiv 2:</p>\n\n<h4>Forma 1: würde + infinitiv (cea mai folosita)</h4>\n<p>Functioneaza pentru aproape orice verb. Ca \"would\" in engleza:</p>\n<table class=\"gram-table\">\n  <tbody>\n    <tr><td>ich würde gehen</td><td>as merge</td></tr>\n    <tr><td>du würdest gehen</td><td>ai merge</td></tr>\n    <tr><td>er würde gehen</td><td>el ar merge</td></tr>\n    <tr><td>wir würden gehen</td><td>am merge</td></tr>\n    <tr><td>ihr würdet gehen</td><td>ati merge</td></tr>\n    <tr><td>sie würden gehen</td><td>ei ar merge</td></tr>\n  </tbody>\n</table>\n<p>Pattern: <strong>würd-</strong> + terminatii ca la prezent + infinitiv la sfarsit.</p>\n\n<h4>Forma 2: forma proprie (pentru cateva verbe importante)</h4>\n<p>Pentru sein, haben, modale si cateva alte verbe se folosesc forme proprii:</p>\n<table class=\"gram-table\">\n  <thead><tr><th>Infinitiv</th><th>Konjunktiv 2 (ich)</th><th>Sens</th></tr></thead>\n  <tbody>\n    <tr><td>sein</td><td><strong>wäre</strong></td><td>as fi</td></tr>\n    <tr><td>haben</td><td><strong>hätte</strong></td><td>as avea</td></tr>\n    <tr><td>können</td><td><strong>könnte</strong></td><td>as putea</td></tr>\n    <tr><td>müssen</td><td><strong>müsste</strong></td><td>ar trebui</td></tr>\n    <tr><td>sollen</td><td><strong>sollte</strong></td><td>ar trebui (sfat)</td></tr>\n    <tr><td>dürfen</td><td><strong>dürfte</strong></td><td>as avea voie</td></tr>\n    <tr><td>wollen</td><td><strong>wollte</strong></td><td>as vrea</td></tr>\n    <tr><td>mögen</td><td><strong>möchte</strong></td><td>as dori</td></tr>\n  </tbody>\n</table>\n\n<h3>Conjugare wäre si hätte</h3>\n<table class=\"gram-table\">\n  <thead><tr><th></th><th>sein -> wäre</th><th>haben -> hätte</th></tr></thead>\n  <tbody>\n    <tr><td>ich</td><td>wäre</td><td>hätte</td></tr>\n    <tr><td>du</td><td>wärst</td><td>hättest</td></tr>\n    <tr><td>er/sie/es</td><td>wäre</td><td>hätte</td></tr>\n    <tr><td>wir</td><td>wären</td><td>hätten</td></tr>\n    <tr><td>ihr</td><td>wärt</td><td>hättet</td></tr>\n    <tr><td>sie</td><td>wären</td><td>hätten</td></tr>\n  </tbody>\n</table>\n\n<h3>Constructia ireala 'wenn ... wäre/hätte, würde ...'</h3>\n<p class=\"gram-example\"><strong>Wenn</strong> ich Zeit <strong>hätte</strong>, <strong>würde</strong> ich nach Rom <strong>fahren</strong>.<br>\n(Daca as avea timp, as merge la Roma.)</p>\n\n<p class=\"gram-example\"><strong>Wenn</strong> ich reicher <strong>wäre</strong>, <strong>würde</strong> ich ein Haus <strong>kaufen</strong>.<br>\n(Daca as fi mai bogat, as cumpara o casa.)</p>\n\n<div class=\"gram-tip\">\n<strong>Sfat:</strong> in propozitia \"wenn\", folosesti hätte/wäre/könnte... In propozitia principala folosesti würde + infinitiv (mai usor). Asa eviti formele ciudate ca \"ginge\" sau \"läse\".\n</div>\n","exercises":[{"type":"fill","prompt":"Wenn ich Zeit ___, würde ich kommen. (a avea, ich - Konj. 2)","answer":"hätte","hint":"haben -> ?","explanation":"haben -> hätte (as avea)."},{"type":"fill","prompt":"Ich ___ gerne ein Glas Wasser. (a-mi dori - politicos)","answer":"möchte","hint":"Konj. 2 de la mögen","explanation":"möchte = as dori (forma standard pentru politete)."},{"type":"choice","prompt":"___ Sie mir bitte helfen?","options":["Können","Konnten","Könnten","Konnten"],"answer":"Könnten","explanation":"Politete -> Konjunktiv 2: Könnten (ati putea)."},{"type":"transform","prompt":"Konjunktiv 2: Ich gehe ins Kino.","answer":"Ich würde ins Kino gehen.","hint":"würde + infinitiv","explanation":"Konj. 2 cu würde: ich würde + infinitiv la sfarsit."},{"type":"fill","prompt":"Wenn ich reich ___, würde ich nicht arbeiten. (a fi)","answer":"wäre","hint":"sein -> ?","explanation":"sein -> wäre. (Daca as fi bogat...)"},{"type":"transform","prompt":"Sfat politicos: Du musst mehr schlafen.","answer":"Du solltest mehr schlafen.","hint":"Konj. 2 al lui sollen","explanation":"Pentru sfat -> sollte. Du solltest = ar trebui sa."}]},{"id":"passiv","level":"B1","category":"Verbe","title_de":"Passiv (werden + Partizip II)","title_ro":"Diateza pasiva","summary":"Pentru a sublinia ACTIUNEA, nu cine o face. werden conjugat + Partizip II la sfarsit.","theory":"\n<h3>Activ vs Pasiv -- ce schimba</h3>\n<p>La <strong>activ</strong> -- subiectul face actiunea: \"Der Mann <strong>kauft</strong> das Auto.\"<br>\nLa <strong>pasiv</strong> -- subiectul primeste actiunea: \"Das Auto <strong>wird</strong> (vom Mann) <strong>gekauft</strong>.\"</p>\n\n<p>Pasivul focalizeaza pe rezultat sau actiune, nu pe persoana. Foarte comun in stiri, instructiuni, proceduri.</p>\n\n<h3>Formula la prezent</h3>\n<p class=\"gram-example\"><strong>Subiect + werden (poz. 2) + ... + Partizip II (la sfarsit)</strong></p>\n\n<table class=\"gram-table\">\n  <thead><tr><th>Persoana</th><th>werden</th></tr></thead>\n  <tbody>\n    <tr><td>ich</td><td>werde</td></tr>\n    <tr><td>du</td><td>wirst</td></tr>\n    <tr><td>er/sie/es</td><td>wird</td></tr>\n    <tr><td>wir</td><td>werden</td></tr>\n    <tr><td>ihr</td><td>werdet</td></tr>\n    <tr><td>sie</td><td>werden</td></tr>\n  </tbody>\n</table>\n\n<h3>Exemple</h3>\n<ul>\n  <li>\"Das Buch <strong>wird</strong> heute <strong>gelesen</strong>.\" (Cartea e citita azi.)</li>\n  <li>\"Hier <strong>werden</strong> Brötchen <strong>gebacken</strong>.\" (Aici se coc cornuri.)</li>\n  <li>\"Das Haus <strong>wurde</strong> 2020 <strong>gebaut</strong>.\" (Casa a fost construita in 2020. -- Präteritum)</li>\n</ul>\n\n<h3>Pasiv la Präteritum (cu wurde)</h3>\n<p>wurde + Partizip II</p>\n<ul>\n  <li>\"Das Telefon <strong>wurde</strong> <strong>erfunden</strong>.\" (Telefonul a fost inventat.)</li>\n</ul>\n\n<h3>Pasiv la Perfekt (cu sein + Partizip II + worden)</h3>\n<p>worden = Partizip de la werden, fara 'ge-' in fata. Atentie: NU 'geworden' (acela e altceva).</p>\n<ul>\n  <li>\"Das Buch <strong>ist</strong> gestern <strong>geschrieben worden</strong>.\" (Cartea a fost scrisa ieri.)</li>\n</ul>\n\n<h3>Cum transform Activ -> Pasiv</h3>\n<ol>\n  <li>Obiectul direct (Akk.) la activ devine subiect (Nom.) la pasiv.</li>\n  <li>Verbul activ devine \"werden + Partizip II\".</li>\n  <li>Subiectul activ devine optional, cu \"von + Dativ\" sau dispare.</li>\n</ol>\n\n<p class=\"gram-example\">Activ: <em>Der Lehrer (Subj.) korrigiert <strong>den Test</strong> (Akk.).</em><br>\nPasiv: <em><strong>Der Test</strong> (Subj.) wird (vom Lehrer) korrigiert.</em></p>\n\n<h3>Pasiv cu modal</h3>\n<p>Modal + Infinitiv pasiv (Partizip + werden)</p>\n<ul>\n  <li>\"Das Auto <strong>muss</strong> <strong>repariert werden</strong>.\" (Masina trebuie reparata.)</li>\n  <li>\"Das Buch <strong>kann</strong> hier <strong>gekauft werden</strong>.\" (Cartea poate fi cumparata aici.)</li>\n</ul>\n\n<div class=\"gram-tip\">\n<strong>Atentie:</strong> doar verbele tranzitive (cu obiect direct/Akk) pot forma pasiv. Verbe ca \"schlafen\", \"gehen\" nu au pasiv personal.\n</div>\n","exercises":[{"type":"transform","prompt":"Activ -> Pasiv: Der Mann kauft das Auto.","answer":"Das Auto wird (vom Mann) gekauft.","hint":"Akk -> Nom + werden + Partizip","explanation":"das Auto trece la subiect, verbul devine 'wird gekauft'."},{"type":"fill","prompt":"Hier ___ Pizza gemacht. (a se face - prezent)","answer":"wird","hint":"es/das + werden","explanation":"Pizza (singular) -> wird gemacht."},{"type":"choice","prompt":"Das Haus ___ 1990 gebaut. (a fi construit - trecut)","options":["wird","wurde","wurden","ist"],"answer":"wurde","explanation":"Pasiv la Präteritum: wurde + Partizip. das Haus -> wurde gebaut."},{"type":"transform","prompt":"Activ -> Pasiv (prezent): Sie schreibt einen Brief.","answer":"Ein Brief wird (von ihr) geschrieben.","hint":"obiect Akk -> subiect","explanation":"einen Brief -> ein Brief la Nominativ. wird + geschrieben."},{"type":"fill","prompt":"Das Auto muss ___ ___. (sa fie reparat - reparieren)","answer":"repariert werden","hint":"Partizip + werden","explanation":"Pasiv cu modal: muss + repariert werden (Partizip + werden infinitiv)."},{"type":"choice","prompt":"Die Briefe ___ heute geschickt. (sunt trimise)","options":["wird","werden","wurden","ist"],"answer":"werden","explanation":"die Briefe (plural) -> werden geschickt."}]},{"id":"praeteritum","level":"B1","category":"Verbe","title_de":"Präteritum (Imperfekt)","title_ro":"Imperfectul (timpul trecut scris)","summary":"Trecut folosit in scris (carti, presa). In vorbire se foloseste mai ales pentru sein, haben, modale.","theory":"\n<h3>Cand folosim Präteritum?</h3>\n<p>In contrast cu Perfekt (folosit in vorbire), Präteritum apare:</p>\n<ul>\n  <li>In <strong>scris</strong>: carti, articole, povesti, cv-uri.</li>\n  <li>In <strong>vorbire</strong>: pentru <em>sein, haben, es gab, modalele</em> (acolo unde Perfekt suna ciudat).</li>\n</ul>\n<p>\"Ich war in Berlin\" e mai natural decat \"Ich bin in Berlin gewesen\".</p>\n\n<h3>Verbe regulate -- adauga -te</h3>\n<p>Pattern: radacina + <strong>-te</strong> + terminatie</p>\n<table class=\"gram-table\">\n  <thead><tr><th></th><th>spielen</th><th>arbeiten</th></tr></thead>\n  <tbody>\n    <tr><td>ich</td><td>spiel<strong>te</strong></td><td>arbeit<strong>ete</strong></td></tr>\n    <tr><td>du</td><td>spiel<strong>test</strong></td><td>arbeit<strong>etest</strong></td></tr>\n    <tr><td>er/sie/es</td><td>spiel<strong>te</strong></td><td>arbeit<strong>ete</strong></td></tr>\n    <tr><td>wir</td><td>spiel<strong>ten</strong></td><td>arbeit<strong>eten</strong></td></tr>\n    <tr><td>ihr</td><td>spiel<strong>tet</strong></td><td>arbeit<strong>etet</strong></td></tr>\n    <tr><td>sie</td><td>spiel<strong>ten</strong></td><td>arbeit<strong>eten</strong></td></tr>\n  </tbody>\n</table>\n<p>Atentie: dupa -t, -d, -m, -n se baga \"e\" in plus (arbeit-e-te).</p>\n\n<h3>Verbe neregulate -- schimba radacina</h3>\n<p>Tre' invatat tabelul. Cele mai uzuale:</p>\n<table class=\"gram-table\">\n  <thead><tr><th>Infinitiv</th><th>Pratium (ich/er)</th><th>Sens</th></tr></thead>\n  <tbody>\n    <tr><td>sein</td><td><strong>war</strong></td><td>am fost</td></tr>\n    <tr><td>haben</td><td><strong>hatte</strong></td><td>aveam</td></tr>\n    <tr><td>gehen</td><td><strong>ging</strong></td><td>am mers</td></tr>\n    <tr><td>kommen</td>
